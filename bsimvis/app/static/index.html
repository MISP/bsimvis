<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BSim Vis Dashboard</title>
    <link rel="stylesheet" href="/css/style.css">
    <script src="https://cdn.bokeh.org/bokeh/release/bokeh-3.3.4.min.js"></script>
    <script src="https://cdn.bokeh.org/bokeh/release/bokeh-widgets-3.3.4.min.js"></script>
    <script src="https://cdn.bokeh.org/bokeh/release/bokeh-api-3.3.4.min.js"></script>
    <link rel="stylesheet" href="https://cdn.bokeh.org/bokeh/release/bokeh-3.3.4.min.css" type="text/css" />
    <link rel="stylesheet" href="https://cdn.bokeh.org/bokeh/release/bokeh-widgets-3.3.4.min.css" type="text/css" />
    <style>
        body {
            background-color: var(--bg);
            color: var(--text);
            font-family: 'Inter', sans-serif;
            margin: 0;
            padding: 0;
            /* Sidebar should touch edges */
            display: flex;
            flex-direction: row;
            /* Horizontal sidebar and main */
            height: 100vh;
            overflow: hidden;
            box-sizing: border-box;
        }

        /* Sidebar */
        nav {
            width: 220px;
            background: #000;
            border-right: 1px solid var(--border);
            display: flex;
            flex-direction: column;
            padding: 20px 0;
        }

        nav h2 {
            padding: 0 20px;
            color: var(--accent);
            font-size: 1rem;
            text-transform: uppercase;
            letter-spacing: 2px;
        }

        nav a {
            padding: 12px 20px;
            color: var(--text);
            text-decoration: none;
            border-left: 3px solid transparent;
            font-size: 0.9rem;
        }

        nav a:hover,
        nav a.active {
            background: var(--card-bg);
            border-left-color: var(--accent);
            color: var(--accent);
        }

        /* Main */
        main {
            flex: 1;
            display: flex;
            flex-direction: column;
            padding: 30px;
            overflow: hidden;
        }

        .header {
            margin-bottom: 20px;
        }

        .header-top {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        /* Table Styling */
        .table-container {
            flex: 1;
            overflow-y: auto;
            background: var(--card-bg);
            border: 1px solid var(--border);
            border-radius: 4px;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            text-align: left;
            font-size: 0.85rem;
        }

        thead {
            position: sticky;
            top: 0;
            background: #000;
            z-index: 10;
        }

        th {
            padding: 12px 15px;
            color: var(--accent);
            text-transform: uppercase;
            font-size: 0.7rem;
            letter-spacing: 1px;
            border-bottom: 2px solid var(--border);
        }

        td {
            padding: 10px 15px;
            border-bottom: 1px solid var(--border);
            vertical-align: middle;
        }

        tr:hover {
            background-color: var(--hover);
        }

        tr:nth-child(even) {
            background-color: #1a1a1a;
        }

        /* Utility */
        .mono {
            font-family: 'JetBrains Mono', 'Consolas', monospace;
            color: var(--success);
        }

        .dim {
            color: var(--subtle);
            font-size: 0.8rem;
        }

        .badge {
            background: var(--border);
            padding: 2px 6px;
            border-radius: 3px;
            font-size: 0.7rem;
            white-space: nowrap;
        }

        .tag-card {
            background: rgba(102, 217, 239, 0.1);
            color: var(--accent);
            border: 1px solid rgba(102, 217, 239, 0.3);
            display: inline-block;
            padding: 2px 8px;
            border-radius: 12px;
            font-size: 0.7rem;
            margin: 2px;
        }

        .sim-tag-card {
            background: rgba(166, 226, 46, 0.1);
            color: var(--success);
            border: 1px solid rgba(166, 226, 46, 0.3);
            display: inline-flex;
            align-items: center;
            gap: 4px;
            padding: 2px 6px 2px 8px;
            border-radius: 12px;
            font-size: 0.65rem;
            margin: 2px;
        }

        .analysis-tag-badge {
            display: inline-flex;
            align-items: center;
            padding: 2px 8px;
            border-radius: 12px;
            font-size: 0.65rem;
            margin: 2px;
            border: 1px dashed rgba(255, 255, 255, 0.15);
            background: rgba(255, 255, 255, 0.05);
            color: #888;
            opacity: 0.8;
        }

        .remove-tag-btn {
            cursor: pointer;
            width: 14px;
            height: 14px;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            border-radius: 50%;
            background: rgba(255, 255, 255, 0.1);
            color: #fff;
            font-size: 10px;
            transition: all 0.2s;
        }

        .remove-tag-btn:hover {
            background: var(--accent);
            color: #000;
        }

        .add-tag-btn {
            background: none;
            border: 1px dashed var(--accent);
            color: var(--accent);
            border-radius: 12px;
            padding: 1px 8px;
            font-size: 0.7rem;
            cursor: pointer;
            margin: 2px;
            transition: all 0.2s;
        }

        .add-tag-btn:hover {
            background: var(--accent);
            color: #000;
            border-style: solid;
        }

        .bookmark-btn {
            background: none;
            border: 1px solid rgba(255, 255, 255, 0.1);
            color: #75715e;
            border-radius: 12px;
            padding: 1px 6px;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            margin: 2px;
            transition: all 0.2s;
            vertical-align: middle;
        }

        .bookmark-btn:hover {
            color: #66d9ef;
            border-color: #66d9ef;
            transform: scale(1.05);
        }

        .bookmark-btn.active {
            color: #66d9ef;
            border-color: #66d9ef;
            background: rgba(102, 217, 239, 0.1);
        }

        .bookmark-btn.active svg {
            fill: #66d9ef;
        }

        .tag-input-field {
            background: #000;
            border: 1px solid var(--accent);
            color: #fff;
            border-radius: 4px;
            padding: 2px 5px;
            font-size: 0.7rem;
            width: 80px;
            outline: none;
        }

        .tag-autocomplete-dropdown {
            position: absolute;
            background: #1A1A1A;
            border: 1px solid var(--accent);
            border-radius: 4px;
            max-height: 200px;
            overflow-y: auto;
            z-index: 10001;
            min-width: 150px;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.8);
            display: none;
            left: 0;
            top: 100%;
        }

        .tag-suggestion-item {
            padding: 6px 10px;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 0.75rem;
            color: #eee;
            transition: all 0.2s;
        }

        .tag-suggestion-item:hover {
            background: rgba(255, 255, 255, 0.05);
            color: var(--accent);
        }

        .tag-color-dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
        }

        /* Syntax Highlighting */
        .token-instruction {
            color: #f92672;
            font-weight: bold;
        }

        .token-register {
            color: #66d9ef;
        }

        .token-address {
            color: #ae81ff;
        }

        .token-constant {
            color: #ae81ff;
        }

        .token-symbol {
            color: #a6e22e;
        }

        .token-comment {
            color: #75715e;
            font-style: italic;
        }

        .token-label {
            color: #a6e22e;
            font-weight: bold;
        }

        .token-operand {
            color: #f8f8f2;
        }

        /* Code Preview Tooltip Wrapper */
        #code-preview-tooltip {
            position: fixed;
            display: none;
            z-index: 9999;
            pointer-events: none;
            max-width: 600px;
            max-height: 800px;
            overflow: visible;
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        #token-tooltip {
            position: fixed;
            pointer-events: none;
            z-index: 10001;
            background: #121212;
            color: #fff;
            border: 1px solid #a6e22e;
            border-radius: 4px;
            padding: 10px;
            font-size: 0.8em;
            line-height: 1.2;
            max-width: 320px;
            box-shadow: 0 4px 10px black;
            display: none;
        }

        /* Premium Tooltip Card */
        .preview-card {
            background: #1A1A1A;
            color: #fff;
            border: 2px solid var(--accent);
            border-radius: 8px;
            padding: 0;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.8);
            overflow: hidden;
            display: flex;
            flex-direction: column;
        }

        #code-preview-tooltip .preview-card {
            padding: 10px;
            border-width: 1px;
            border-color: #66d9ef;
        }

        /* Others Count Card */
        .others-count-card {
            background: rgba(26, 26, 26, 0.95);
            border-left: 4px solid var(--accent);
            padding: 8px 15px;
            border-radius: 4px;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.5);
            color: var(--accent);
            font-weight: bold;
            font-size: 0.85rem;
            display: flex;
            align-items: center;
            gap: 10px;
            backdrop-filter: blur(4px);
            z-index: 1000;
        }

        .context-menu {
            z-index: 5000;
        }

        .preview-header {
            color: #75715e;
            font-size: 0.65rem;
            text-transform: uppercase;
            margin-bottom: 8px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
            padding-bottom: 4px;
        }

        .preview-line {
            white-space: pre;
            display: flex;
        }

        .preview-ln {
            color: #75715e;
            width: 30px;
            text-align: right;
            padding-right: 10px;
            user-select: none;
        }

        .filter-bar {
            margin: 15px 0;
            display: flex;
            gap: 10px;
        }

        .filter-bar input {
            background: #000;
            border: 1px solid var(--border);
            color: var(--text);
            padding: 8px;
            border-radius: 4px;
            width: 300px;
        }

        .btn-action {
            color: var(--accent);
            cursor: pointer;
            text-decoration: none;
            font-weight: bold;
        }

        .btn-action:hover {
            text-decoration: underline;
        }

        .btn-primary {
            background: var(--accent);
            color: #000;
            border: none;
            padding: 10px 20px;
            border-radius: 4px;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.2s;
        }

        .btn-primary:hover {
            filter: brightness(1.2);
            box-shadow: 0 0 15px var(--accent);
        }



        #loader {
            padding: 20px;
            text-align: center;
            color: var(--accent);
        }

        .load-more-container {
            padding: 20px;
            text-align: center;
        }

        /* Diff, Code, & Feature Panels */
        #diff-panel,
        #code-panel,
        #feature-panel,
        #global-feature-panel {
            display: none;
            /* Managed by JS */
            position: fixed;
            bottom: 0;
            left: 220px;
            right: 0;
            height: 60vh;
            background: #0d0f14;
            border-top: 3px solid var(--accent);
            z-index: 9999;
            flex-direction: column;
            box-shadow: 0 -10px 40px rgba(0, 0, 0, 0.8);
        }

        #diff-panel-header,
        #code-panel-header,
        #feature-panel-header,
        #global-feature-panel-header {
            background: var(--border);
            padding: 8px 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
        }

        #diff-frame {
            width: 100%;
            flex: 1;
            border: none;
            background: #0d0f14;
        }

        .diff-queue-badge,
        .code-view-badge {
            background: var(--accent);
            color: #000;
            padding: 2px 8px;
            border-radius: 10px;
            font-size: 0.7rem;
            margin-right: 10px;
        }

        .resize-handle {
            height: 4px;
            width: 100%;
            cursor: ns-resize;
            background: transparent;
            position: absolute;
            top: 0;
            left: 0;
            z-index: 10001;
        }

        .resize-handle:hover {
            background: var(--accent);
            opacity: 0.5;
        }

        .panel-actions {
            display: flex;
            gap: 8px;
            align-items: center;
        }

        .btn-panel {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            color: #aaa;
            cursor: pointer;
            padding: 4px 10px;
            border-radius: 4px;
            font-size: 0.75rem;
            transition: all 0.2s;
        }

        .btn-panel:hover {
            background: rgba(255, 255, 255, 0.15);
            color: #fff;
            border-color: var(--accent);
        }

        th.sortable {
            cursor: pointer;
            user-select: none;
        }

        th.sortable:hover {
            background: #111;
            color: #fff;
        }

        .filter-row th {
            padding: 5px 10px;
            background: #080808;
            border-bottom: 1px solid var(--border);
        }

        .filter-row input {
            width: 100%;
            background: #000;
            border: 1px solid #333;
            color: #aaa;
            font-size: 0.7rem;
            padding: 4px;
            border-radius: 2px;
        }

        .filter-row input:focus {
            border-color: var(--accent);
            outline: none;
            color: #fff;
        }

        /* Diff Preview Tooltip Wrapper */
        #diff-preview-tooltip {
            position: fixed;
            display: none;
            z-index: 10002;
            pointer-events: none;
            width: 800px;
            max-height: 800px;
            overflow: visible;
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .diff-preview-header {
            background: #1a1a1a;
            padding: 8px 15px;
            font-size: 0.75rem;
            border-bottom: 1px solid #333;
            display: flex;
            justify-content: space-between;
            color: var(--accent);
            font-weight: bold;
        }

        /* View Toggle Switch */
        .view-toggle {
            display: flex;
            background: #111;
            border: 1px solid var(--border);
            border-radius: 20px;
            padding: 2px;
            margin-left: 20px;
        }

        .view-btn {
            background: none;
            border: none;
            color: #666;
            padding: 4px 12px;
            border-radius: 18px;
            font-size: 0.7rem;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.2s;
        }

        .view-btn.active {
            background: var(--accent);
            color: #111;
        }

        /* --- Similarity Graph Styles --- */
        #bk-similarity-plot {
            flex: 1;
            min-height: 500px;
            position: relative;
        }

        .graph-controls {
            position: absolute;
            bottom: 15px;
            right: 15px;
            z-index: 100;
            display: flex;
            gap: 10px;
        }

        .btn-graph {
            background: var(--success);
            color: #121212;
            border: none;
            padding: 8px 15px;
            border-radius: 4px;
            font-size: 12px;
            font-weight: bold;
            cursor: pointer;
            text-transform: uppercase;
            transition: all 0.2s;
            box-shadow: 0 4px 10px rgba(0, 0, 0, 0.5);
        }

        .btn-graph:hover {
            background: #bfef45;
            transform: translateY(-2px);
        }

        .btn-graph.stop {
            background: var(--accent);
            color: #fff;
        }

        .btn-graph.stop:hover {
            background: #ff4d8d;
        }

        #graph-loading-overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(18, 18, 18, 0.9);
            z-index: 9999;
            display: none;
            justify-content: center;
            align-items: center;
            flex-direction: column;
            color: var(--info);
            font-family: "Segoe UI", monospace;
            font-size: 18px;
            backdrop-filter: blur(5px);
        }

        .spinner-graph {
            border: 4px solid #333;
            border-top: 4px solid var(--info);
            border-radius: 50%;
            width: 40px;
            height: 40px;
            animation: spin 1s linear infinite;
            margin-bottom: 15px;
        }
    </style>

<body>
    <nav>
        <h2>BSim Vis</h2>
        <a href="#collections" id="nav-collections">Collections</a>

        <div style="padding: 20px 20px 5px 20px; border-top: 1px solid var(--border); margin-top: 15px;">
            <div class="dim" style="font-size: 0.6rem; text-transform: uppercase;">Current Collection</div>
            <select id="side-collection-select"
                style="width: 100%; background: #111; color: var(--success); border: 1px solid var(--border); padding: 5px; margin-top: 5px; border-radius: 4px; font-weight: bold; font-size: 0.8rem; cursor: pointer;">
                <option value="">None Selected</option>
            </select>
        </div>

        <a href="#batches" id="nav-batches" style="display:none">Batches</a>
        <a href="#files" id="nav-files" style="color:var(--text); display:none">Files</a>
        <a href="#functions" id="nav-functions" style="color:var(--text); display:none">Functions</a>
        <a href="#features-global" id="nav-features-global" style="color:var(--text); display:none">Global Features</a>
        <a href="#function-similarity" id="nav-function-similarity" style="color:var(--text); display:none">Function
            Similarities</a>

        <div style="margin-top:auto; padding-top:20px; border-top: 1px solid var(--border);">
            <div class="dim" style="padding: 0 20px 10px 20px; font-size: 0.6rem; text-transform: uppercase;">Tools
            </div>
            <a href="#" id="nav-diffing" onclick="showDiffView()" style="color:var(--accent); font-weight:bold;">Diffing
                Tool</a>
        </div>
    </nav>

    <main>
        <div class="header">
            <div class="header-top">
                <div style="display:flex; align-items:center; gap:15px;">
                    <h1 id="view-title" style="margin:0">Dashboard</h1>
                    <span id="view-total" class="badge"
                        style="background:rgba(255,171,46,0.1); color:var(--accent); font-size:0.75rem; display:none; border:1px solid rgba(255,171,46,0.3)"></span>
                    <div id="search-settings-container" style="display:none; align-items:center; gap:8px;"></div>
                </div>
                <div style="display:flex; gap:10px; align-items:center;">
                    <div id="diff-queue-status" style="font-size:0.8rem; color:var(--dim)"></div>
                    <button onclick="refreshData()"
                        style="background:none; border:1px solid var(--accent); color:var(--accent); cursor:pointer; padding:5px 12px; border-radius:4px;">Refresh</button>
                    <button onclick="clearFilters()"
                        style="background:none; border:1px solid #ff4d8d; color:#ff4d8d; cursor:pointer; padding:5px 12px; border-radius:4px; font-size:0.8rem;">Clear Filters</button>
                </div>
            </div>
            <p id="view-subtitle" style="margin: 5px 0 0 0; font-size: 0.9rem;"></p>
            <div id="search-area"></div>
        </div>

        <div class="table-container" id="table-view-container">
            <table id="data-table">
                <thead id="table-head"></thead>
                <tbody id="table-body"></tbody>
            </table>
            <div id="loader">Loading...</div>

            <div id="graph-view-container"
                style="display:none; height:calc(100vh - 300px); border:1px solid var(--border); background:#121212; border-radius:4px; overflow:hidden; margin-top:10px; position:relative;">
                <div id="graph-loading-overlay">
                    <div class="spinner-graph"></div>
                    <div id="graph-loading-text">Initializing Map...</div>
                    <div id="graph-stream-info" style="margin-top:10px; font-size:14px; color:#aaa;"></div>
                </div>
                <div id="bk-similarity-plot" style="width:100%; height:100%;"></div>
                <div class="graph-controls">
                    <button id="graph-refresh-btn" class="btn-graph" title="Force Reload Data">↺ Refresh Map</button>
                    <button id="graph-stop-btn" class="btn-graph stop" style="display:none">Stop Load</button>
                </div>
            </div>

            <div id="pagination-container" class="load-more-container"></div>
        </div>
    </main>

    <script>
        let currentOffset = 0;
        const PAGE_SIZE = 20;
        let isEndOfResults = false;
        let lastHashPath = '';
        let tagMetadata = {}; // Cache for tag metadata: { tag: { color: "#..." } }
        let selectedSimilarityPairs = new Set(); // Global selection state: Set of "id1|id2|algo"

        async function fetchTagMetadata(collection) {
            if (!collection) return;
            try {
                const res = await fetch(`/api/tags?collection=${collection}`);
                if (res.ok) {
                    tagMetadata = await res.json();
                }
                // Ensure bookmark has a default look if not set on server
                if (!tagMetadata['bookmark']) {
                    tagMetadata['bookmark'] = { color: '#66d9ef', priority: 100, count: 0 };
                }
            } catch (err) {
                console.error("Failed to fetch tag metadata", err);
            }
        }

        const routes = {
            '#collections': {
                title: 'Collections',
                api: '/api/collection/search',
                headers: ['Name', 'Files', 'Functions', 'Last Updated', 'Actions'],
                renderer: renderCollections
            },
            '#batches': {
                title: 'Batches',
                api: '/api/batch/search',
                headers: ['Batch Name', 'UUID', 'Files', 'Functions', 'Timestamp', 'Actions'],
                renderer: renderBatches
            },
            '#files': {
                title: 'Files',
                api: '/api/file/search',
                headers: ['Filename', 'MD5 / Arch', 'Entry Date', 'Actions'],
                renderer: renderFiles
            },
            '#functions': {
                title: 'Functions',
                api: '/api/function/search',
                headers: ['Function', 'Entry Addr', 'Tags', 'File Name', 'MD5', 'Decompiler', 'Thunk', 'Ret Type', 'CC', 'Features', 'Date', 'Actions'],
                renderer: renderFunctions
            },
            '#features-global': {
                title: 'Global Feature Index',
                api: '/api/feature/search',
                headers: ['Feature Hash', 'Type / Op', 'PCode Context', 'C Code Context', 'Total TF', 'Funcs', 'Actions'],
                renderer: renderGlobalFeatures
            },
            '#function-similarity': {
                title: 'Function similarities',
                api: '/api/similarity/search',
                headers: [
                    { label: 'Similarity', sort: 'score', width: '9%' },
                    { label: 'Function Pair', width: '20%' },
                    { label: 'Function Tags', width: '18%' },
                    { label: 'Feat', sort: 'feat_count', width: '5%' },
                    { label: 'Language', width: '15%' },
                    { label: 'Binary MD5s', width: '18%' },
                    { label: 'Actions / Algo', width: '10%' }
                ],
                renderer: renderTopCorrelations
            }
        };

        function clearFilters() {
            const [hashPath, queryString] = (window.location.hash || '#collections').split('?');
            const params = new URLSearchParams(queryString);
            const newParams = new URLSearchParams();

            // Preserved context keys
            const preserved = ['collection', 'batch_uuid', 'file_md5', 'algo', 'view'];
            preserved.forEach(k => {
                if (params.has(k)) newParams.set(k, params.get(k));
            });

            currentOffset = 0;
            isEndOfResults = false;
            window.location.hash = hashPath + (newParams.toString() ? '?' + newParams.toString() : '');
        }

        async function refreshData(appendArg = false) {
            const append = (appendArg === true);
            const [hashPath, queryString] = (window.location.hash || '#collections').split('?');
            const full_hash = hashPath + (queryString ? '?' + queryString : '');
            const route = routes[hashPath];
            if (!route) return;

            if (full_hash !== lastHashPath || !append) {
                currentOffset = 0;
                isEndOfResults = false;
                document.getElementById('table-body').innerHTML = '';
                document.getElementById('loader').style.display = 'block';
            }
            lastHashPath = full_hash;

            const params = new URLSearchParams(queryString);
            const collection = params.get('collection') || 'main';
            if (hashPath === '#function-similarity') {
                await fetchTagMetadata(collection);
            }

            // Standard pagination for all search routes
            const countLimit = params.get('limit') || (params.get('view') === 'graph' ? '1000' : '20');
            params.set('offset', currentOffset);
            params.set('limit', countLimit);

            let apiUrl = route.api + (params.toString() ? '?' + params.toString() : '');
            updateUI(hashPath, params, route);

            if (params.get('view') === 'graph' && hashPath === '#function-similarity') {
                document.getElementById('loader').style.display = 'none';
                return;
            }

            try {
                const response = await fetch(apiUrl);
                const data = await response.json();

                // Extract the list of items based on the API response structure
                const items = data.items || data.files || data.functions || data.features || data.pairs || data.collections || data.batches || (Array.isArray(data) ? data : []);
                const total = data.total !== undefined ? data.total : (data.total_estimated !== undefined ? data.total_estimated : (Array.isArray(data) ? data.length : (items.length || 0)));

                const totalEl = document.getElementById('view-total');
                const poolIcon = document.getElementById('pool-warn-icon');
                const limitIcon = document.getElementById('limit-warn-icon');
                const poolInput = document.getElementById('sim-pool-limit');
                const limitInput = document.getElementById('sim-limit');

                if (totalEl) {
                    totalEl.style.display = 'inline-block';
                    // Let the end of function update the text to include shown count

                    if (poolIcon) {
                        if (data.pool_truncated) {
                            document.getElementById('pool-warn-icon').style.display = 'inline-block';
                            document.getElementById('pool-warn-icon').title = `⚠️ Pool Truncated to first ${data.pool_limit || '---'} matches. Results may be incomplete.`;
                            if (poolInput) poolInput.style.borderColor = '#ffab2e';
                        } else {
                            poolIcon.style.display = 'none';
                            if (poolInput) poolInput.style.borderColor = 'var(--accent)';
                        }
                    }

                    if (limitIcon) {
                        const currentLimit = parseInt(params.get('limit')) || 20;
                        if (total >= currentLimit && hashPath === '#function-similarity') {
                            limitIcon.style.display = 'inline-block';
                            limitIcon.title = `ℹ️ Result Limit Reached (${currentLimit.toLocaleString()}). Not all pairs are shown.`;
                            if (limitInput) limitInput.style.borderColor = '#60a5fa';
                        } else {
                            limitIcon.style.display = 'none';
                            if (limitInput) limitInput.style.borderColor = 'var(--accent)';
                        }
                    }
                }

                const tbody = document.getElementById('table-body');
                if (items.length === 0 && !append) {
                    tbody.innerHTML = '<tr><td colspan="100" style="text-align:center; padding:40px;">No data found</td></tr>';
                } else {
                    tbody.insertAdjacentHTML('beforeend', route.renderer(items));
                }

                currentOffset += (items.length || 0);
                isEndOfResults = currentOffset >= total;

                // Update total display with "Shown / Total" format
                if (totalEl) {
                    totalEl.style.display = 'inline-block';
                    totalEl.innerText = `${currentOffset.toLocaleString()} / ${total.toLocaleString()}`;
                }

                renderPagination(hashPath);
            } catch (err) {
                console.error(err);
            } finally {
                document.getElementById('loader').style.display = 'none';
            }
        }

        function applySearch() {
            const [hashPath, queryString] = (window.location.hash || '#collections').split('?');
            const params = new URLSearchParams(queryString);

            if (hashPath === '#files') {
                const val = document.getElementById('file-search').value;
                if (val) params.set('file_name', val);
                else params.delete('file_name');
            } else if (hashPath === '#features-global') {
                const val = document.getElementById('feature-search').value;
                if (val) params.set('hash', val);
                else params.delete('hash');

                const sortTf = document.getElementById('sort-tf').checked;
                if (sortTf) params.set('sort', 'tf');
                else params.delete('sort');
            }

            // Reset the offset globally before the hash changes
            currentOffset = 0;
            isEndOfResults = false;

            // Change the hash - this triggers the 'hashchange' listener
            window.location.hash = `${hashPath}?${params.toString()}`;
        }

        function toggleSort(key) {
            const params = new URLSearchParams(window.location.hash.split('?')[1] || '');
            const currentSort = params.get('sort_by');
            const currentOrder = params.get('sort_order') || 'desc';

            if (currentSort === key) {
                params.set('sort_order', currentOrder === 'desc' ? 'asc' : 'desc');
            } else {
                params.set('sort_by', key);
                params.set('sort_order', 'desc');
            }
            currentOffset = 0;
            window.location.hash = `${window.location.hash.split('?')[0]}?${params.toString()}`;
        }

        function applyFuncSearch() {
            const params = new URLSearchParams(window.location.hash.split('?')[1] || '');
            const fields = ['function_name', 'file_name', 'file_md5', 'decompiler_id', 'is_thunk', 'return_type', 'calling_convention', 'entrypoint_address'];
            fields.forEach(f => {
                const el = document.getElementById('flt-' + f);
                if (el) {
                    const val = el.value;
                    if (val) params.set(f, val);
                    else params.delete(f);
                }
            });

            // Handle Tags
            const tagVal = document.getElementById('flt-tag')?.value;
            const tagType = document.getElementById('type-func-tag')?.value || 'tag';
            ['tag', 'static_tag', 'user_tag'].forEach(t => params.delete(t));
            if (tagVal) params.set(tagType, tagVal);

            currentOffset = 0;
            isEndOfResults = false;
            window.location.hash = `#functions?${params.toString()}`;
        }

        function switchSimView(mode) {
            const params = new URLSearchParams(window.location.hash.split('?')[1] || '');
            params.set('view', mode);
            window.location.hash = `#function-similarity?${params.toString()}`;
        }

        function loadGraphView(params) {
            document.getElementById('graph-view-container').style.display = 'block';
            if (!window.graphInstance) {
                window.graphInstance = new SimilarityGraph('bk-similarity-plot');
                document.getElementById('graph-refresh-btn').onclick = () => {
                    const p = new URLSearchParams(window.location.hash.split('?')[1] || '');
                    window.graphInstance.fetch(p);
                };
                document.getElementById('graph-stop-btn').onclick = () => window.graphInstance.stop();
            }
            window.graphInstance.fetch(params);
        }

        function applySimSearch() {
            const [hashPath, queryString] = (window.location.hash || '#collections').split('?');
            const params = new URLSearchParams(queryString);

            const minScore = document.getElementById('sim-min-score')?.value;
            const maxScore = document.getElementById('sim-max-score')?.value;
            const algo = document.getElementById('sim-algo')?.value;
            const minFeatures = document.getElementById('sim-min-features')?.value;
            const crossBinary = document.getElementById('sim-cross-binary')?.value;
            const globalQ = document.getElementById('sim-search-input')?.value;
            const lang = document.getElementById('flt-sim-language')?.value;
            const poolLimit = document.getElementById('sim-pool-limit')?.value;
            const countLimit = document.getElementById('sim-limit')?.value;

            // ALWAY set params for canonical URL state (Perfect Match)
            params.set('q', globalQ || '');
            if (lang) params.set('language', lang); else params.delete('language');
            params.set('min_score', minScore || '0.95');
            params.set('max_score', maxScore || '1.0');
            params.set('algo', algo || 'unweighted_cosine');
            params.set('min_features', minFeatures || '0');

            if (crossBinary) params.set('cross_binary', crossBinary);
            else params.delete('cross_binary');
            params.set('pool_limit', poolLimit || '1000000');
            params.set('limit', countLimit || (params.get('view') === 'graph' ? '1000' : '20'));

            const useCache = document.getElementById('sim-use-cache')?.checked;
            params.set('use_cache', useCache !== false ? 'true' : 'false');

            // Per-column filters
            const nameFlt = document.getElementById('flt-sim-name')?.value;
            const funcTagFlt = document.getElementById('flt-sim-func-tag')?.value;
            const funcTagType = document.getElementById('type-sim-func-tag')?.value || 'func_tag';
            const simTagFlt = document.getElementById('flt-sim-sim-tag')?.value;
            const simTagType = document.getElementById('type-sim-sim-tag')?.value || 'sim_tag';
            const md5Flt = document.getElementById('flt-sim-md5')?.value;

            if (nameFlt) params.set('name', nameFlt); else params.delete('name');
            
            // Handle Func Tags (Columns 4)
            ['tag', 'static_tag', 'user_tag', 'func_tag', 'func_static_tag', 'func_user_tag'].forEach(t => params.delete(t));
            if (funcTagFlt) params.set(funcTagType, funcTagFlt);

            // Handle Sim Tags (Column 2)
            ['sim_tag', 'sim_static_tag', 'sim_user_tag'].forEach(t => params.delete(t));
            if (simTagFlt) params.set(simTagType, simTagFlt);

            params.delete('md5');
            if (md5Flt) {
                const md5s = md5Flt.split(/[\s,]+/).filter(x => x.length > 0);
                md5s.forEach(m => params.append('md5', m));
            }

            currentOffset = 0;
            isEndOfResults = false;
            window.location.hash = `${hashPath}?${params.toString()}`;
        }

        function renderPagination(path) {
            const container = document.getElementById('pagination-container');
            container.innerHTML = (!isEndOfResults) ?
                `<button class="btn-primary" onclick="refreshData(true)">Load More Results</button>` : '';
        }

        function copyToClipboard(text, btn) {
            navigator.clipboard.writeText(text).then(() => {
                const originalHtml = btn.innerHTML;
                btn.innerHTML = '<span style="color:var(--success)">✓</span>';
                setTimeout(() => { btn.innerHTML = originalHtml; }, 1500);
            }).catch(err => console.error('Failed to copy', err));
        }

        // --- Renderers (Return Table Rows) ---

        function renderCollections(data) {
            if (!data.length) return '<tr><td colspan="5" style="text-align:center">No collections found.</td></tr>';

            return data.map(col => `
        <tr>
            <td><b style="color:var(--accent)">${col.name}</b></td>
            <td class="mono">${col['total_files']}</td>
            <td class="mono">${col['total_functions']}</td>
            <td class="dim">${formatDate(col['last_updated'])}</td>
            <td>
                <div style="display: flex; gap: 15px;">
                    <a class="btn-action" href="#batches?collection=${col.name}">
                        Browse Batches
                    </a>
                    <span style="color:var(--border)">|</span>
                    <a class="btn-action" href="#files?collection=${col.name}" style="color:var(--success)">
                        View All Files →
                    </a>
                </div>
            </td>
        </tr>
    `).join('');
        }

        function renderBatches(data) {
            return data.map(b => {
                const col = b.collection || 'unknown';
                return `
                <tr>
                    <td>
                        <div style="display:inline-flex; align-items:center; gap:8px;">
                            <b>${b.name || 'Unnamed'}</b>
                            <button class="btn-copy" title="Copy Batch ID: ${b['batch_id']}" onclick="copyToClipboard('${b['batch_id']}', this)">
                                <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="9" y="9" width="13" height="13" rx="2" ry="2"></rect><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"></path></svg>
                            </button>
                        </div>
                    </td>
                    <td class="mono dim" style="font-size:0.7rem">${b['batch_uuid']}</td>
                    <td class="mono">${b['total_files']}</td>
                    <td class="mono">${b['total_functions']}</td>
                    <td class="dim">${formatDate(b['last_updated'] || b['created_at'])}</td>
                    <td><a class="btn-action" href="#files?collection=${col}&batch_uuid=${b['batch_uuid']}">View Files</a></td>
                </tr>
            `}).join('');
        }

        function renderFiles(data) {
            const params = new URLSearchParams(window.location.hash.split('?')[1] || '');
            const col = params.get('collection');
            return data.map(f => `
                <tr>
                    <td>
                        <div style="display:inline-flex; align-items:center; gap:8px;">
                            <b style="color:var(--accent)">${f['file_name']}</b>
                            <button class="btn-copy" title="Copy File ID: ${f['file_id']}" onclick="copyToClipboard('${f['file_id']}', this)">
                                <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="9" y="9" width="13" height="13" rx="2" ry="2"></rect><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"></path></svg>
                            </button>
                        </div>
                    </td>
                    <td>
                        <div class="mono" style="font-size:0.7rem">${f['file_md5']}</div>
                        <div class="dim">${f['language_id']}</div>
                    </td>
                    <td class="dim">${formatDate(f['entry_date'])}</td>
                    <td><a class="btn-action" href="#functions?collection=${col}&file_md5=${f['file_md5']}">Functions →</a></td>
                </tr>
            `).join('');
        }

        function renderFunctions(data) {
            return data.map(f => {
                const meta = f['function_metadata'] || f;
                const name = meta['function_name'] || 'Unknown';
                const entry = meta['entrypoint_address'] || '';
                const tags = (meta['tags'] || []).map(t => `<span class="tag-card">${t}</span>`).join('');
                const fileName = meta['file_name'] || '';
                const file_md5 = meta['file_md5'] || '';
                const decompiler = meta['decompiler_id'] || '';
                const isThunk = meta['is_thunk'] ? 'Yes' : 'No';
                const retType = meta['return_type'] || 'void';
                const cc = meta['calling_convention'] || 'unknown';
                const funcId = meta['function_id'] || `${meta.collection}:function:${file_md5}:${entry}`;

                // BSim features
                const featCount = meta['bsim_features_count'] || 0;
                const uniqueCount = meta['bsim_unique_features_count'] || 0;

                // Safe quote escaping for onclick
                const safeName = (name || '').replace(/'/g, "\\'");

                return `
                <tr>
                    <td>
                        <div style="display:inline-flex; align-items:center; gap:8px;">
                            <b style="color:var(--accent); cursor:pointer;" 
                               onmouseenter="showCodePreview('${funcId}', '${safeName}', '${entry}', '${file_md5}', ${featCount}, event)" 
                               onmousemove="moveCodePreview(event)"
                               onmouseleave="hideCodePreview(event)">
                               ${name}
                            </b>
                            <button class="btn-copy" title="Copy Function ID: ${funcId}" onclick="copyToClipboard('${funcId}', this)">
                                <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="9" y="9" width="13" height="13" rx="2" ry="2"></rect><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"></path></svg>
                            </button>
                        </div>
                    </td>   
                    <td class="mono" style="font-size:0.75rem">${entry}</td>
                    <td>${tags}</td>
                    <td class="dim" style="max-width:120px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;" title="${fileName}">${fileName}</td>
                    <td class="mono" style="font-size:0.7rem;max-width:80px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;" title="${file_md5}">${file_md5}</td>
                    <td class="dim" style="font-size:0.7rem;max-width:80px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;" title="${decompiler}">${decompiler}</td>
                    <td class="dim">${isThunk}</td>
                    <td class="dim">${retType}</td>
                    <td class="dim">${cc}</td>
                    <td>
                        <span class="badge">F: ${featCount}</span><br>
                        <span class="badge" style="margin-top:2px;display:inline-block">U: ${uniqueCount}</span>
                    </td>
                    <td class="dim">${formatDate(meta['entry_date'] || meta['file_date'])}</td>
                    <td>
                        <div style="display:flex; gap:5px; margin-top:10px;">
                            <button class="btn-feat-action" onclick="showFeaturePanel('${funcId}')"><span>🔍</span> Features</button>
                            <button class="btn-code-action" onclick="showFunctionCodeById('${funcId}', '${safeName}')"><span>↗</span> Code</button>
                            <button class="btn-diff-action" onclick="addToDiff('${funcId}', '${safeName}')"><span>+</span> Add to Diff</button>
                        </div>
                    </td>
                </tr>
            `}).join('');
        }

        function renderGlobalFeatures(items) {
            const params = new URLSearchParams(window.location.hash.split('?')[1] || '');
            const col = params.get('collection');
            if (!items.length) return '<tr><td colspan="6" style="text-align:center">No features found.</td></tr>';

            return items.map(f => {
                const ctx = f.context || {};

                // PCode Rendering in Card
                let pcodeHtml = `
                    <div class="code-card">
                        <div class="code-card-line">
                            <div class="code-card-text pcode-text">${ctx.pcode_full || 'N/A'}</div>
                        </div>
                    </div>`;

                // C Code Tokens Rendering in Card
                let cCodeHtml = '<span class="dim">N/A</span>';
                if (ctx.c_code) {
                    const funcId = ctx.func_id || `${col}:function:${ctx.md5}:${ctx.addr}`;
                    const funcName = (ctx.name || ctx.addr);
                    const targetLinesStr = (ctx.line_idxs || []).map(l => l + 1).join(',');
                    const lineHash = targetLinesStr ? `#L${targetLinesStr}` : '';

                    const displayLine = (ctx.line_idxs && ctx.line_idxs.length > 0) ? ctx.line_idxs[0] + 1 : 1;
                    cCodeHtml = `<div class="code-card clickable" title="Click to jump to lines ${targetLinesStr || ''}"
                             onclick="showFunctionCodeById('${funcId}', '${funcName.replace(/'/g, "\\'")}', '${lineHash}')">
                        <div class="code-card-line">
                            <div class="code-card-ln">${displayLine}</div>
                            <div class="code-card-text">`;
                    ctx.c_code.forEach(t => {
                        const colorMap = {
                            'variable': 'tok-variable', 'func_call': 'tok-func_call', 'type': 'tok-type',
                            'keyword': 'tok-keyword', 'comment': 'tok-comment', 'string': 'tok-string', 'number': 'tok-number'
                        };
                        const cls = colorMap[t.type] || 'tok-default';
                        // Add metadata for the context menu
                        cCodeHtml += `<span class="${cls} feature-highlight" 
                            data-hashes="${f.hash}" 
                            data-type="${ctx.type || ''}" 
                            data-op="${ctx.op || ''}" 
                            data-tf="${Math.round(f.tf_score || 0)}"
                            onmouseenter="showTokenTooltip(event)"
                            onmouseleave="hideTokenTooltip()"
                            onmousemove="moveCodePreview(event)">${t.text.replace(/&/g, '&amp;').replace(/</g, '&lt;')}</span>`;
                    });
                    cCodeHtml += `</div></div></div>`;
                }

                return `
                <tr>
                    <td>
                        <div style="display:inline-flex; align-items:center; gap:8px;">
                            <code class="mono" style="color:var(--accent)">${f.hash}</code>
                            <button class="btn-copy" title="Copy Feature ID: ${f['feature_id']}" onclick="copyToClipboard('${f['feature_id']}', this)">
                                <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="9" y="9" width="13" height="13" rx="2" ry="2"></rect><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"></path></svg>
                            </button>
                        </div>
                    </td>
                    <td>
                        <div class="dim" style="font-size:0.65rem; font-weight:bold; color:var(--accent);">${ctx.type}</div>
                        <span class="badge" style="margin-top:2px; font-size:0.65rem;">${ctx.op}</span>
                    </td>
                    <td style="max-width:300px;">${pcodeHtml}</td>
                    <td style="max-width:350px;">${cCodeHtml}</td>
                    <td class="mono" style="color:var(--accent)">${f.tf_score !== undefined ? Math.round(f.tf_score) : '<span class="dim">-</span>'}</td>
                    <td class="mono">${f.frequency}</td>
                    <td>
                        <button class="btn-action" style="background:none; border:none; padding:0; font-size:0.8rem; text-align:left; color:var(--accent);" 
                            onclick="showGlobalFeaturePanel('${f.hash}', '${col}')">Analyze →</button>
                    </td>
                </tr>
            `}).join('');
        }

        function getRowTagColor(tags, userTags = []) {
            const allTags = [...(tags || []), ...(userTags || [])];
            if (localStorage.getItem('sim-color-by-tag') !== 'true' || allTags.length === 0) return "";
            let bestColor = null;
            let maxPrio = -1;
            allTags.forEach(t => {
                let meta = tagMetadata[t];
                // Enforce fixed light blue for bookmark with high priority
                if (t === 'bookmark') {
                    meta = { color: '#66d9ef', priority: 1000 };
                }
                if (meta && (meta.priority || 0) > maxPrio) {
                    maxPrio = meta.priority || 0;
                    bestColor = meta.color;
                }
            });
            if (bestColor) {
                return `linear-gradient(90deg, ${bestColor}22 0%, transparent 100%)`;
            }
            return "";
        }

        function refreshAllRowColors() {
            const rows = document.querySelectorAll('tr.sim-row');
            rows.forEach(tr => {
                const simEditor = tr.querySelector('.sim-tags-editor');
                if (!simEditor) return;

                const analystCards = simEditor.querySelectorAll('.sim-tag-card');
                const analysisCards = simEditor.querySelectorAll('.analysis-tag-badge');
                const userTags = Array.from(analystCards).map(c => c.textContent.replace('×', '').trim());
                const analysisTags = Array.from(analysisCards).map(c => c.textContent.trim());

                // Only check the similarity-level bookmark button
                const bookmarkBtn = simEditor.querySelector('.bookmark-btn');
                if (bookmarkBtn && bookmarkBtn.classList.contains('active')) {
                    if (!userTags.includes('bookmark')) userTags.push('bookmark');
                }

                tr.style.background = getRowTagColor(analysisTags, userTags);
            });
        }

        function renderTopCorrelations(items) {
            if (!items || !items.length) return '<tr><td colspan="6" style="text-align:center; padding:40px;">No similarity pairs found in this collection.</td></tr>';

            return items.map(p => {
                const s1 = p.id1.split(':');
                const s2 = p.id2.split(':');
                
                // New 5-part format: idx:coll:func:md5:addr
                // Old 4-part format: coll:function:md5:addr
                const offset1 = s1[0] === 'idx' ? 1 : 0;
                const offset2 = s2[0] === 'idx' ? 1 : 0;

                const m1 = s1[2 + offset1] || '---';
                const m2 = s2[2 + offset2] || '---';
                const addr1 = s1[3 + offset1] || '---';
                const addr2 = s2[3 + offset2] || '---';

                const tags1 = [
                    ...(p.meta1?.tags || []).map(t => `<span class="analysis-tag-badge" style="font-size:0.55rem; padding: 1px 5px; margin: 1px;">${t}</span>`),
                    ...(p.meta1?.user_tags || []).map(t => `<span class="tag-card" style="font-size:0.55rem; padding: 1px 5px; margin: 1px; border-color:rgba(102, 217, 239, 0.3); color:#66d9ef; background:rgba(102, 217, 239, 0.05);">${t}</span>`)
                ].join('');

                const tags2 = [
                    ...(p.meta2?.tags || []).map(t => `<span class="analysis-tag-badge" style="font-size:0.55rem; padding: 1px 5px; margin: 1px;">${t}</span>`),
                    ...(p.meta2?.user_tags || []).map(t => `<span class="tag-card" style="font-size:0.55rem; padding: 1px 5px; margin: 1px; border-color:rgba(166,226,46,0.3); color:#a6e22e; background:rgba(166,226,46,0.05);">${t}</span>`)
                ].join('');

                const name1 = (p.name1 || '---').replace(/'/g, "\\'");
                const name2 = (p.name2 || '---').replace(/'/g, "\\'");

                const tags = p.tags || [];
                const user_tags = p.user_tags || [];
                const isBookmarked = user_tags.includes('bookmark');
                const rowStyle = getRowTagColor(tags, user_tags);

                const renderTagEditor = (etype, eid, tagsList, userTagsList, options = {}) => {
                    const isBookmarked = userTagsList.includes('bookmark');
                    const editorClass = etype === 'similarity' ? 'sim-tags-editor' : 'entity-tags-editor';
                    const bookmarkOnClick = etype === 'similarity'
                        ? `toggleBookmark(event, '${p.id1}', '${p.id2}', '${p.algo}')`
                        : `toggleEntityBookmark(event, '${etype}', '${eid}')`;

                    const addOnClick = etype === 'similarity'
                        ? `startAddTag(event, 'similarity', '${p.id1}|${p.id2}|${p.algo}')`
                        : `startAddTag(event, '${etype}', '${eid}')`;

                    const analysisHtml = tagsList.map(t => `<span class="analysis-tag-badge" title="Analysis Tag: ${t}">${t}</span>`).join('');
                    const userHtml = userTagsList.map(t => {
                        if (t === 'bookmark') return '';
                        const meta = tagMetadata[t] || { color: '#66d9ef' };
                        const color = meta.color;
                        const removeClick = etype === 'similarity'
                            ? `removeTag(event, 'similarity', '${p.id1}|${p.id2}|${p.algo}', '${t}')`
                            : `removeTag(event, '${etype}', '${eid}', '${t}')`;
                        return `
                        <span class="sim-tag-card" style="border-color:${color}44; color:${color}; background:${color}11;">
                            ${t} 
                            <span class="remove-tag-btn" onclick="${removeClick}" style="background:${color}22">×</span>
                        </span>`;
                    }).join('');

                    return `
                        <div class="${editorClass}" data-etype="${etype}" data-eid="${eid}" style="display:inline-flex; flex-wrap:wrap; gap:2px; align-items:center; vertical-align:middle;">
                            <button class="bookmark-btn ${isBookmarked ? 'active' : ''}" 
                                    title="${isBookmarked ? 'Remove Bookmark' : 'Add Bookmark'}"
                                    onclick="${bookmarkOnClick}">
                                <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M19 21l-7-5-7 5V5a2 2 0 0 1 2-2h10a2 2 0 0 1 2 2z"></path></svg>
                            </button>
                            ${analysisHtml}
                            ${userHtml}
                            <button class="add-tag-btn" onclick="${addOnClick}">+</button>
                        </div>
                    `;
                };

                const pairId = `${p.id1}|${p.id2}|${p.algo}`;

                return `
                <tr class="sim-row" style="background: ${rowStyle}" data-id1="${p.id1}" data-id2="${p.id2}" data-algo="${p.algo}">
                    <td style="text-align:center; vertical-align:middle;">
                        <input type="checkbox" class="row-selector" 
                                data-pair-id="${pairId}"
                                ${selectedSimilarityPairs.has(pairId) ? 'checked' : ''} 
                                onchange="toggleSimilaritySelection(event, '${p.id1}', '${p.id2}', '${p.algo}')">
                    </td>
                    <td>
                        <div style="font-size:1.1rem; font-weight:bold; color:var(--success);">${(p.score * 100).toFixed(1)}%</div>
                        <div class="dim" style="font-size:0.6rem; margin-bottom:5px;">SIMILARITY</div>
                        ${renderTagEditor('similarity', pairId, tags, user_tags)}
                    </td>
                    <td>
                        <div style="display:flex; flex-direction:column; justify-content: space-around; height: 100%; gap: 10px;">
                            <div style="display:flex; align-items:center; gap:8px; overflow:hidden;">
                                <span class="badge" style="min-width:30px; font-size:0.6rem; text-align:center; flex-shrink:0;">L</span>
                                <b style="color:var(--accent); cursor:pointer; font-size:0.9rem; overflow:hidden; text-overflow:ellipsis; white-space:nowrap;" onclick="showFunctionCodeById('${p.id1}', '${name1}')">${p.name1 || '---'}</b>
                                <span class="dim" style="font-size:0.65rem; white-space:nowrap; flex-shrink:0;">@ ${addr1}</span>
                            </div>
                            <div style="display:flex; align-items:center; gap:8px; overflow:hidden;">
                                <span class="badge" style="min-width:30px; font-size:0.6rem; text-align:center; background:var(--success); color:#000; flex-shrink:0;">R</span>
                                <b style="color:var(--accent); cursor:pointer; font-size:0.9rem; overflow:hidden; text-overflow:ellipsis; white-space:nowrap;" onclick="showFunctionCodeById('${p.id2}', '${name2}')">${p.name2 || '---'}</b>
                                <span class="dim" style="font-size:0.65rem; white-space:nowrap; flex-shrink:0;">@ ${addr2}</span>
                            </div>
                        </div>
                    </td>
                    <td>
                        <div style="display:flex; flex-direction:column; justify-content: space-around; height: 100%; gap: 10px;">
                            <div>${renderTagEditor('function', p.id1, p.meta1?.tags || [], p.meta1?.user_tags || [])}</div>
                            <div>${renderTagEditor('function', p.id2, p.meta2?.tags || [], p.meta2?.user_tags || [])}</div>
                        </div>
                    </td>
                    <td style="text-align:center; vertical-align:middle;">
                        <span class="mono" style="font-size:0.75rem; color:var(--accent); display:block;">${p.meta1?.bsim_features_count || 0}</span>
                        <span class="mono" style="font-size:0.75rem; color:var(--success); display:block;">${p.meta2?.bsim_features_count || 0}</span>
                    </td>
                    <td>
                        <div style="margin-bottom:5px;">
                            <span class="dim" style="font-size:0.65rem;">L:</span> <span class="mono" style="font-size:0.7rem; color:var(--accent)">${p.meta1?.language_id || '---'}</span>
                        </div>
                        <div>
                            <span class="dim" style="font-size:0.65rem;">R:</span> <span class="mono" style="font-size:0.7rem; color:var(--success)">${p.meta2?.language_id || '---'}</span>
                        </div>
                    </td>
                    <td>
                        <div style="margin-bottom:8px;">
                            <div style="display:flex; align-items:center; gap:5px;">
                                <span class="dim" style="font-size:0.65rem; min-width:12px;">L:</span>
                                <span class="mono" style="color:var(--success); font-size:0.65rem;">${m1}</span>
                            </div>
                            <div style="color:#aaa; font-size:0.75rem; margin-top:2px; max-width:220px; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; opacity:0.8;" title="${p.meta1?.file_name}">${p.meta1?.file_name || ''}</div>
                        </div>
                        <div>
                            <div style="display:flex; align-items:center; gap:5px;">
                                <span class="dim" style="font-size:0.65rem; min-width:12px;">R:</span>
                                <span class="mono" style="color:var(--success); font-size:0.65rem;">${m2}</span>
                            </div>
                            <div style="color:#aaa; font-size:0.75rem; margin-top:2px; max-width:220px; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; opacity:0.8;" title="${p.meta2?.file_name}">${p.meta2?.file_name || ''}</div>
                        </div>
                    </td>
                    <td>
                        <button class="btn-diff-action" 
                            onmouseenter="showDiffPreview('${p.id1}', '${name1}', '${p.id2}', '${name2}', ${p.score}, event)" 
                            onmousemove="moveCodePreview(event)"
                            onmouseleave="hideDiffPreview(event)"
                            onclick="openDiffDirectly('${p.id1}', '${p.name1.replace(/'/g, "\\'")}', '${p.id2}', '${p.name2.replace(/'/g, "\\'")}')" style="font-size:0.7rem; padding:4px 8px;">
                            <span>↔</span> Run Diff
                        </button>
                    </td>
                </tr>
            `}).join('');
        }

        // --- Similarity Graph Logic (Single-Document Integration) ---
        window.simGraph = null;

        class SimilarityGraph {
            constructor(containerId) {
                this.containerId = containerId;
                this.mousePos = { clientX: 0, clientY: 0 };
                window.addEventListener('mousemove', e => {
                    this.mousePos.clientX = e.clientX;
                    this.mousePos.clientY = e.clientY;
                });
                this.abortController = null;
                this.all_pairs = [];
                this.nodes_map = new Map();
                this.unique_nodes = [];
                this.binary_md5s = new Set();
                this.plot = null;
                window.graphInstance = this;

                // 1. Initialize Data Sources
                this.seg_source = new Bokeh.ColumnDataSource({ data: { x0: [], y0: [], x1: [], y1: [], color: [], alpha: [], width: [] } });
                this.hit_source = new Bokeh.ColumnDataSource({ data: { xs: [], ys: [], f1: [], f2: [], b1: [], b2: [], score: [], c1: [], c2: [], s1: [], s2: [], id1: [], id2: [], fn1: [], fn2: [] } });
                this.node_source = new Bokeh.ColumnDataSource({ data: { x: [], y: [], name: [], addr: [], bin: [], color: [], v_size: [], id: [], snippet: [], file_name: [], return_type: [], tags: [] } });
                this.ring_source = new Bokeh.ColumnDataSource({ data: { start: [], end: [], color: [], name: [], md5: [], file_name: [], inner_r: [], outer_r: [], count: [] } });

                this.initPlot();
            }

            initPlot() {
                const container = document.getElementById(this.containerId);
                const width = container.clientWidth || 800;
                const height = container.clientHeight || 500;

                this.plot = Bokeh.Plotting.figure({
                    width: width, height: height,

                });

                this.plot.grid.grid_line_color = null;

                // Glyphs
                const r_ring = this.plot.annular_wedge({ x: 0, y: 0, inner_radius: { field: 'inner_r' }, outer_radius: { field: 'outer_r' }, start_angle: { field: 'start' }, end_angle: { field: 'end' }, color: { field: 'color' }, alpha: 0.3, source: this.ring_source });
                this.plot.segment({ x0: { field: 'x0' }, y0: { field: 'y0' }, x1: { field: 'x1' }, y1: { field: 'y1' }, color: { field: 'color' }, line_alpha: { field: 'alpha' }, line_width: { field: 'width' }, source: this.seg_source });
                const r_links = this.plot.multi_line({ xs: { field: 'xs' }, ys: { field: 'ys' }, line_width: 15, line_alpha: 0, hover_line_alpha: 0.6, hover_line_color: "white", source: this.hit_source });
                const r_nodes = this.plot.circle({ x: { field: 'x' }, y: { field: 'y' }, size: 11, color: { field: 'color' }, line_color: "white", source: this.node_source });

                // Hover Tools (No native tooltips)
                const h_bin = new Bokeh.HoverTool({ renderers: [r_ring], tooltips: null });
                const h_links = new Bokeh.HoverTool({ renderers: [r_links], tooltips: null });
                const h_nodes = new Bokeh.HoverTool({ renderers: [r_nodes], tooltips: null });
                h_bin.callback = new Bokeh.CustomJS({
                    args: { source: this.ring_source },
                    code: `
                        const indices = cb_data.index.indices;
                        if (indices.length > 0 && !window.graphContextMenuOpen) {
                            const name = source.data.name[indices[0]];
                            const md5 = source.data.md5[indices[0]];

                        } else {

                        }
                    `
                });

                h_links.callback = new Bokeh.CustomJS({
                    args: { source: this.hit_source },
                    code: `
                        const indices = cb_data.index.indices;
                        window.lastGraphLinkIndices = indices;
                        if (indices.length > 0 && !window.graphNodeHovered && !window.graphContextMenuOpen) {
                            const id1 = source.data.id1[indices[0]];
                            const id2 = source.data.id2[indices[0]];
                            const n1 = source.data.f1[indices[0]];
                            const n2 = source.data.f2[indices[0]];
                            const score = source.data.score[indices[0]];
                            const extra = indices.length - 1;
                            const rect = document.getElementById('bk-similarity-plot').getBoundingClientRect();
                            const e = { clientX: cb_data.geometry.vx + rect.left, clientY: cb_data.geometry.vy + rect.top };
                            if (window.showDiffPreview) window.showDiffPreview(id1, n1, id2, n2, score, e, extra);
                        } else {
                            if (window.hideDiffPreview) window.hideDiffPreview();
                        }
                    `
                });

                h_nodes.callback = new Bokeh.CustomJS({
                    args: { source: this.node_source },
                    code: `
                        const indices = cb_data.index.indices;
                        window.lastGraphNodeIndices = indices;
                        if (indices.length > 0 && !window.graphContextMenuOpen) {
                            window.graphNodeHovered = true;
                            const id = source.data.id[indices[0]];
                            const name = source.data.name[indices[0]];
                            const addr = source.data.addr[indices[0]];
                            const bin = source.data.bin[indices[0]];
                            const file_name = source.data.file_name[indices[0]];
                            const v_size = source.data.v_size[indices[0]];
                            const extra = indices.length - 1;
                            const rect = document.getElementById('bk-similarity-plot').getBoundingClientRect();
                            const e = { clientX: cb_data.geometry.vx + rect.left, clientY: cb_data.geometry.vy + rect.top };
                            if (window.showCodePreview) window.showCodePreview(id, name, addr, bin, v_size, e, extra, file_name);
                        } else {
                            window.graphNodeHovered = false;
                            if (window.hideCodePreview) window.hideCodePreview();
                        }
                    `
                });

                this.plot.add_tools(h_bin, h_links, h_nodes, new Bokeh.TapTool({ renderers: [r_links, r_nodes] }));
                this.plot.toolbar.active_inspect = [h_bin, h_links, h_nodes];

                // Tap Logic (direct call)
                const onSelect = () => {
                    const node_inds = this.node_source.selected.indices;
                    const hit_inds = this.hit_source.selected.indices;

                    if (this.node_source.data.id && node_inds.length > 0) {
                        const id = this.node_source.data.id[node_inds[0]];
                        const name = this.node_source.data.name[node_inds[0]];
                        window.showFunctionCodeById(id, name);
                        this.node_source.selected.indices = [];
                    } else if (hit_inds.length > 0) {
                        const id1 = this.hit_source.data.id1[hit_inds[0]]; const id2 = this.hit_source.data.id2[hit_inds[0]];
                        const name1 = this.hit_source.data.f1[hit_inds[0]]; const name2 = this.hit_source.data.f2[hit_inds[0]];
                        window.openDiffDirectly(id1, name1, id2, name2);
                        this.hit_source.selected.indices = [];
                    }
                };
                this.node_source.selected.properties.indices.change.connect(onSelect.bind(this));
                this.hit_source.selected.properties.indices.change.connect(onSelect.bind(this));

                Bokeh.Plotting.show(this.plot, `#${this.containerId}`);
            }

            getRingTooltip() {
                return `<div style="padding:12px; background:#1A1A1A; color:#FFF; border:2px solid @color; border-radius:8px; min-width:200px;">
                    <div style="font-size:14px; font-weight:bold; margin-bottom:4px; color:@color;">@file_name (BINARY)</div>
                    <div style="font-size:11px; color:#AAA; margin-bottom:8px;">MD5: @md5</div>
                    <div style="display:flex; justify-content:space-between; font-size:12px; border-top:1px solid #333; padding-top:8px;">
                        <span>Functions in Graph:</span>
                        <span style="font-weight:bold; color:#ff79c6;">@count</span>
                    </div>
                </div>`;
            }

            getLinkTooltip() {
                return `<div style="padding:12px; background:#121212; color:#D4D4D4; border:1px solid #444; border-radius:8px; width:340px;">
                    <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:10px;">
                        <span style="color:#A6E22E; font-weight:bold; font-size:16px;">@score MATCH</span>
                        <span style="font-size:10px; color:#777;">Pair Summary</span>
                    <div style="display:grid; grid-template-columns: 1fr 1fr; gap:8px;">
                        <div style="background:#1A1A1A; padding:6px; border-radius:4px; border-left:3px solid @c1;">
                            <div style="font-size:10px; font-weight:bold; color:#AAA; overflow:hidden; white-space:nowrap; text-overflow:ellipsis;" title="@fn1">@f1</div>
                            <div style="font-size:8px; color:#777; overflow:hidden; text-overflow:ellipsis;">@fn1</div>
                        </div>
                        <div style="background:#1A1A1A; padding:6px; border-radius:4px; border-left:3px solid @c2;">
                            <div style="font-size:10px; font-weight:bold; color:#AAA; overflow:hidden; white-space:nowrap; text-overflow:ellipsis;" title="@fn2">@f2</div>
                            <div style="font-size:8px; color:#777; overflow:hidden; text-overflow:ellipsis;">@fn2</div>
                        </div>
