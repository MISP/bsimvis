            }

            getNodeTooltip() {
                return `<div style="padding:12px; background:#1A1A1A; color:#D4D4D4; border:2px solid @color; border-radius:8px; width:280px;">
                    <div style="font-size:13px; font-weight:bold; margin-bottom:2px; color:@color;">@name</div>
                    <div style="font-size:11px; color:#AAA; margin-bottom:4px; font-style:italic;">@file_name</div>
                    <div style="font-size:10px; color:#AAA; margin-bottom:8px;">Addr: @addr | Features: @v_size | @return_type</div>
                </div>`;
            }

            stop() { if (this.abortController) this.abortController.abort(); }

            async fetch(params) {
                if (this.abortController) this.abortController.abort();
                this.abortController = new AbortController();
                const signal = this.abortController.signal;

                this.all_pairs = []; this.nodes_map.clear(); this.unique_nodes = []; this.binary_md5s.clear();

                const overlay = document.getElementById('graph-loading-overlay');
                const streamInfo = document.getElementById('graph-stream-info');
                const loadingText = document.getElementById('graph-loading-text');
                const stopBtn = document.getElementById('graph-stop-btn');
                const MAX_TOTAL = parseInt(params.get('limit')) || 1000;

                overlay.style.display = 'flex';
                loadingText.innerText = "Building Similarity Map...";
                streamInfo.innerText = "";
                stopBtn.style.display = 'inline-block';

                // Clone and clean params to avoid duplicates in loop (like &offset=0&offset=500)
                const cleanParams = new URLSearchParams(params.toString());
                cleanParams.delete('limit');
                cleanParams.delete('offset');
                const base_url = `/api/similarity/search?${cleanParams.toString()}`;
                let currentOffset = 0;

                // Clear the graph immediately
                this.updateSources(params);

                try {
                    while (currentOffset < MAX_TOTAL && !signal.aborted) {
                        const BATCH_SIZE = Math.min(MAX_TOTAL - this.all_pairs.length, 500);
                        if (BATCH_SIZE <= 0) break;

                        const res = await fetch(`${base_url}&limit=${BATCH_SIZE}&offset=${currentOffset}`, { signal });
                        const data = await res.json();

                        // Handle truncation and limit alerts next to inputs
                        const poolIcon = document.getElementById('pool-warn-icon');
                        const limitIcon = document.getElementById('limit-warn-icon');
                        const poolInput = document.getElementById('sim-pool-limit');
                        const limitInput = document.getElementById('sim-limit');
                        const totalEl = document.getElementById('view-total');

                        if (poolIcon) {
                            if (data.pool_truncated) {
                                poolIcon.style.display = 'inline-block';
                                poolIcon.title = `⚠️ Pool Truncated to first ${data.pool_limit || '---'} matches. Results may be incomplete.`;
                                if (poolInput) poolInput.style.borderColor = '#ffab2e';
                            } else {
                                poolIcon.style.display = 'none';
                                if (poolInput) poolInput.style.borderColor = 'var(--accent)';
                            }
                        }

                        const pairs = data.pairs || [];
                        if (pairs.length === 0) break;

                        this.all_pairs = this.all_pairs.concat(pairs);

                        if (limitIcon) {
                            if (this.all_pairs.length >= MAX_TOTAL) {
                                limitIcon.style.display = 'inline-block';
                                limitIcon.title = `ℹ️ Result Limit Reached (${MAX_TOTAL.toLocaleString()}). Map display is capped.`;
                                if (limitInput) limitInput.style.borderColor = '#60a5fa';
                            } else {
                                limitIcon.style.display = 'none';
                                if (limitInput) limitInput.style.borderColor = 'var(--accent)';
                            }
                        }

                        if (totalEl) {
                            totalEl.style.display = 'inline-block';
                            totalEl.innerText = `${this.all_pairs.length.toLocaleString()} / ${(data.total || 0).toLocaleString()}`;
                        }
                        pairs.forEach(p => {
                            [{ id: p.id1, name: p.name1, meta: p.meta1 }, { id: p.id2, name: p.name2, meta: p.meta2 }].forEach(n => {
                                if (!this.nodes_map.has(n.id)) {
                                    const node_obj = {
                                        id: n.id, name: n.name, md5: n.meta.file_md5,
                                        file_name: n.meta.file_name, return_type: n.meta.return_type,
                                        addr: n.id.split(':').pop(), v_size: n.meta.bsim_features_count,
                                        language_id: n.meta.language_id || 'N/A',
                                        tags: n.meta.tags || []
                                    };
                                    this.nodes_map.set(n.id, node_obj); this.unique_nodes.push(node_obj); this.binary_md5s.add(n.meta.file_md5);
                                }
                            });
                        });

                        this.updateSources(params);
                        streamInfo.innerText = `Streamed ${this.all_pairs.length} matches...`;
                        currentOffset += BATCH_SIZE;
                        if (pairs.length < BATCH_SIZE) break;
                    }
                } catch (e) { if (e.name !== 'AbortError') console.error(e); }
                finally {
                    overlay.style.display = 'none';
                    stopBtn.style.display = 'none';
                }
            }

            updateSources(params) {
                if (this.all_pairs.length === 0) {
                    this.node_source.data = { x: [], y: [], name: [], addr: [], bin: [], color: [], v_size: [], id: [], file_name: [], return_type: [], tags: [] };
                    this.seg_source.data = { x0: [], y0: [], x1: [], y1: [], color: [], alpha: [], width: [] };
                    this.hit_source.data = { xs: [], ys: [], f1: [], f2: [], b1: [], b2: [], score: [], c1: [], c2: [], id1: [], id2: [], fn1: [], fn2: [] };
                    this.ring_source.data = { start: [], end: [], color: [], name: [], md5: [], file_name: [], inner_r: [], outer_r: [], count: [] };
                    return;
                }

                this.unique_nodes.sort((a, b) => a.md5.localeCompare(b.md5) || a.name.localeCompare(b.name));
                const n_active = this.unique_nodes.length;
                const theta_step = (2 * Math.PI) / n_active;
                const derived_r = Math.max(2.5, 0.3 / theta_step);
                const ring_inner = derived_r + 0.3; const ring_outer = derived_r + 1.8;

                const id_to_info = new Map();
                this.unique_nodes.forEach((n, i) => {
                    const angle = i * theta_step;
                    id_to_info.set(n.id, { ...n, x: derived_r * Math.cos(angle), y: derived_r * Math.sin(angle), angle: angle });
                });

                const palette = ["#1f77b4", "#aec7e8", "#ff7f0e", "#ffbb78", "#2ca02c", "#98df8a", "#d62728", "#ff9896", "#9467bd", "#c5b0d5", "#8c564b", "#c49c94", "#e377c2", "#f7b6d2", "#7f7f7f", "#c7c7c7", "#bcbd22", "#dbdb8d", "#17becf", "#9edae5"];
                const bin_list = Array.from(this.binary_md5s).sort();
                const bin_colors = new Map(bin_list.map((md5, i) => [md5, palette[i % 20]]));

                const ns = { x: [], y: [], name: [], addr: [], bin: [], color: [], v_size: [], id: [], file_name: [], return_type: [] };
                this.unique_nodes.forEach(n => {
                    const info = id_to_info.get(n.id);
                    ns.x.push(info.x); ns.y.push(info.y); ns.name.push(n.name); ns.addr.push(n.addr);
                    ns.bin.push(n.md5.slice(0, 8)); ns.color.push(bin_colors.get(n.md5));
                    ns.v_size.push(n.v_size); ns.id.push(n.id);
                    ns.file_name.push(n.file_name || ''); ns.return_type.push(n.return_type || 'N/A');
                });

                const ss = { x0: [], y0: [], x1: [], y1: [], color: [], alpha: [], width: [] };
                const hs = { xs: [], ys: [], f1: [], f2: [], b1: [], b2: [], score: [], c1: [], c2: [], id1: [], id2: [], fn1: [], fn2: [] };
                const minScoreParam = params.get('min_score');
                const minScore = (minScoreParam !== null && minScoreParam !== "") ? parseFloat(minScoreParam) : 0.95;

                this.all_pairs.forEach(p => {
                    const n1 = id_to_info.get(p.id1); const n2 = id_to_info.get(p.id2);
                    if (!n1 || !n2) return;
                    const t_vals = []; for (let i = 0; i <= 1; i += 1 / 15) t_vals.push(i);
                    const curve = t_vals.map(t => {
                        const it = 1 - t;
                        return { x: it * it * n1.x + 2 * it * t * 0 + t * t * n2.x, y: it * it * n1.y + 2 * it * t * 0 + t * t * n2.y };
                    });
                    const col1 = bin_colors.get(n1.md5); const col2 = bin_colors.get(n2.md5);
                    const norm = (p.score - minScore) / (1.0 - minScore + 0.0001);
                    for (let k = 0; k < curve.length - 1; k++) {
                        ss.x0.push(curve[k].x); ss.y0.push(curve[k].y); ss.x1.push(curve[k + 1].x); ss.y1.push(curve[k + 1].y);
                        ss.color.push(this.blendHex(col1, col2, t_vals[k])); ss.alpha.push(0.1 + (norm * 0.7)); ss.width.push(0.5 + (norm * 6));
                    }
                    hs.xs.push(curve.map(v => v.x)); hs.ys.push(curve.map(v => v.y));
                    hs.f1.push(p.name1); hs.f2.push(p.name2); hs.b1.push(n1.md5.slice(0, 8)); hs.b2.push(n2.md5.slice(0, 8));
                    hs.score.push(p.score.toFixed(4)); hs.c1.push(col1); hs.c2.push(col2); hs.id1.push(p.id1); hs.id2.push(p.id2);
                    hs.fn1.push(n1.file_name || n1.md5.slice(0, 8)); hs.fn2.push(n2.file_name || n2.md5.slice(0, 8));

                });

                const rs = { start: [], end: [], color: [], name: [], md5: [], file_name: [], inner_r: [], outer_r: [], count: [], language: [], tags: [] };
                bin_list.forEach(md5 => {
                    const md5_nodes = this.unique_nodes.map((n, i) => ({ n, i })).filter(item => item.n.md5 === md5);
                    if (md5_nodes.length > 0) {
                        const start_idx = md5_nodes[0].i; const end_idx = md5_nodes[md5_nodes.length - 1].i;
                        const col = bin_colors.get(md5);
                        rs.start.push(start_idx * theta_step - theta_step / 2); rs.end.push(end_idx * theta_step + theta_step / 2);
                        rs.color.push(col); rs.name.push(md5.slice(0, 8)); rs.md5.push(md5);
                        rs.file_name.push(md5_nodes[0].n.file_name || md5.slice(0, 8));
                        rs.inner_r.push(ring_inner); rs.outer_r.push(ring_outer);
                        rs.count.push(md5_nodes.length);
                        rs.language.push(md5_nodes[0].n.language_id);
                        const all_tags = new Set();
                        md5_nodes.forEach(item => { (item.n.tags || []).forEach(t => all_tags.add(t)); });
                        rs.tags.push(Array.from(all_tags).join(', '));
                    }
                });

                this.node_source.data = ns; this.seg_source.data = ss; this.hit_source.data = hs; this.ring_source.data = rs;
            }

            blendHex(c1, c2, t) {
                const rgb1 = [parseInt(c1.slice(1, 3), 16), parseInt(c1.slice(3, 5), 16), parseInt(c1.slice(5, 7), 16)];
                const rgb2 = [parseInt(c2.slice(1, 3), 16), parseInt(c2.slice(3, 5), 16), parseInt(c2.slice(5, 7), 16)];
                const res = rgb1.map((v, i) => Math.round(v * (1 - t) + rgb2[i] * t));
                return "#" + res.map(v => v.toString(16).padStart(2, '0')).join('');
            }
        }

        function formatDate(iso) {
            if (!iso || iso === 'N/A') return '---';

            // If it's a string that consists only of digits, convert to number
            if (typeof iso === 'string' && /^\d+$/.test(iso)) {
                iso = parseInt(iso, 10);
            }

            const d = new Date(iso);
            if (isNaN(d.getTime())) return iso;
            return d.toLocaleString();
        }

        function normalizeFuncId(id) {
            if (!id || typeof id !== 'string') return id;
            if (id.includes(':function:') || id.includes(':func:')) return id;

            // Pattern for raw BSim ID: collection:#md5::funcName:@addr
            const parts = id.split(':');
            if (parts.length >= 4) {
                const addrPart = parts.pop();
                const funcPart = parts.pop();
                const emptyPart = parts.pop();
                const md5Part = parts.pop();
                const colPart = parts.join(':');

                if (addrPart && addrPart.startsWith('@') && md5Part && md5Part.startsWith('#')) {
                    const cleanAddr = addrPart.substring(1);
                    const cleanMd5 = md5Part.substring(1);
                    // Standardize to new short 'func' format
                    return `idx:${colPart}:func:${cleanMd5}:${cleanAddr}`;
                }
            }
            return id;
        }

        // --- Diff Logic ---
        let diffSelection = [];

        function addToDiff(a1, a2) {
            const id = normalizeFuncId(a1);
            const name = a2 || id.split(':').pop();

            const existing = diffSelection.findIndex(item => item.id === id);
            if (existing !== -1) {
                diffSelection.splice(existing, 1);
            } else {
                diffSelection.push({ id, name });
            }

            if (diffSelection.length > 2) {
                diffSelection.shift();
            }

            updateDiffQueueUI();
            saveDiffQueue();

            if (diffSelection.length === 2) {
                showDiffPanel();
            }
        }

        function saveDiffQueue() {
            localStorage.setItem('bsim_diff_queue', JSON.stringify(diffSelection));
        }

        function loadDiffQueue() {
            try {
                const stored = localStorage.getItem('bsim_diff_queue');
                if (stored) {
                    diffSelection = JSON.parse(stored);
                    updateDiffQueueUI();
                }
            } catch (e) { console.error("Failed to load diff queue", e); }
        }

        function updateDiffQueueUI() {
            const status = document.getElementById('diff-queue-status');
            if (diffSelection.length === 0) {
                status.innerText = '';
            } else if (diffSelection.length === 1) {
                status.innerHTML = `
                    <span class="badge" style="background:var(--accent); color:#000; display:flex; align-items:center; gap:8px;">
                        1/2 Selected: ${diffSelection[0].name}
                        <button onclick="clearDiffSelection()" style="background:none; border:none; cursor:pointer; color:#000; font-weight:bold; font-size:1.1rem; padding:0; line-height:1;">&times;</button>
                    </span>`;
            } else {
                status.innerHTML = `
                    <span class="badge" style="background:var(--success); color:#000; display:flex; align-items:center; gap:8px;">
                        2/2 Ready: ${diffSelection[0].name} vs ${diffSelection[1].name}
                        <button onclick="clearDiffSelection()" style="background:none; border:none; cursor:pointer; color:#000; font-weight:bold; font-size:1.1rem; padding:0; line-height:1;">&times;</button>
                    </span>`;
            }
        }

        function clearDiffSelection() {
            diffSelection = [];
            updateDiffQueueUI();
            saveDiffQueue();
        }

        function showDiffPanel(force = false) {
            if (!force && diffSelection.length < 2) return;

            hideCodePanel();
            hideFeaturePanel();
            hideGlobalFeaturePanel();

            const p = document.getElementById('diff-panel');
            const f = document.getElementById('diff-frame');
            const title = document.getElementById('diff-title');

            let url = '/diff/index.html';
            let label = 'Function Comparison';

            if (diffSelection.length === 2) {
                url = `/diff/index.html?id1=${encodeURIComponent(diffSelection[0].id)}&id2=${encodeURIComponent(diffSelection[1].id)}`;
                label = `Diff: ${diffSelection[0].name} vs ${diffSelection[1].name}`;

                // Reset queue after opening
                diffSelection = [];
                updateDiffQueueUI();
                saveDiffQueue();
            }

            if (p) p.style.display = 'flex';
            if (title) title.innerText = label;
            if (f) f.src = url;
        }

        function openDiffDirectly(id1, name1, id2, name2) {
            hideCodePanel();
            hideFeaturePanel();
            hideGlobalFeaturePanel();

            const p = document.getElementById('diff-panel');
            const f = document.getElementById('diff-frame');
            const title = document.getElementById('diff-title');

            const url = `/diff/index.html?id1=${encodeURIComponent(normalizeFuncId(id1))}&id2=${encodeURIComponent(normalizeFuncId(id2))}`;

            if (p) p.style.display = 'flex';
            if (title) title.innerText = `Diff: ${name1} vs ${name2}`;
            if (f) f.src = url;
        }

        function hideDiffPanel() {
            const p = document.getElementById('diff-panel');
            if (p) p.style.display = 'none';
        }

        function showDiffView() {
            let url = '/diff/index.html';
            if (diffSelection.length === 2) {
                url = `/diff/index.html?id1=${encodeURIComponent(diffSelection[0].id)}&id2=${encodeURIComponent(diffSelection[1].id)}`;

                // Reset queue after opening in new window
                diffSelection = [];
                updateDiffQueueUI();
                saveDiffQueue();
            }
            window.open(url, '_blank');
        }

        function showFunctionCodeById(id, name, lineHash = '') {
            hideFeaturePanel();
            hideGlobalFeaturePanel();
            const p = document.getElementById('code-panel');
            const f = document.getElementById('code-frame');
            const title = document.getElementById('code-title');

            if (p) p.style.display = 'flex';
            if (title) title.innerText = `Code: ${name}`;
            if (f) f.src = `/function/index.html?id=${encodeURIComponent(id)}${lineHash}`;
        }

        function hideCodePanel() {
            const p = document.getElementById('code-panel');
            if (p) p.style.display = 'none';
        }

        // --- Feature Panel Logic ---
        function showFeaturePanel(id) {
            hideCodePanel();
            const p = document.getElementById('feature-panel');
            const f = document.getElementById('feature-frame');
            const title = document.getElementById('feature-title');

            const addr = id.split(':').pop();

            if (p) p.style.display = 'flex';
            if (title) title.innerText = `Features: ${addr}`;
            if (f) f.src = `/function/features/index.html?id=${encodeURIComponent(id)}`;
        }

        function hideFeaturePanel() {
            const p = document.getElementById('feature-panel');
            if (p) p.style.display = 'none';
        }

        // --- Global Feature Panel Logic ---
        function showGlobalFeaturePanel(hash, collection) {
            hideCodePanel();
            hideFeaturePanel();
            const p = document.getElementById('global-feature-panel');
            const f = document.getElementById('global-feature-frame');
            const title = document.getElementById('global-feature-title');

            if (p) p.style.display = 'flex';
            if (title) title.innerText = `Feature Analysis: ${hash.substring(0, 12)}...`;
            if (f) f.src = `/feature/index.html?hash=${encodeURIComponent(hash)}&collection=${encodeURIComponent(collection)}`;
        }

        function hideGlobalFeaturePanel() {
            const p = document.getElementById('global-feature-panel');
            if (p) p.style.display = 'none';
        }

        function launchExternal(type) {
            let url = '';
            if (type === 'diff') {
                url = document.getElementById('diff-frame').src;
            } else if (type === 'code') {
                url = document.getElementById('code-frame').src;
            } else if (type === 'features') {
                url = document.getElementById('feature-frame').src;
            } else if (type === 'global-feature') {
                url = document.getElementById('global-feature-frame').src;
            }

            if (url) {
                window.open(url, '_blank');
                if (type === 'diff') hideDiffPanel();
                else if (type === 'code') hideCodePanel();
                else if (type === 'features') hideFeaturePanel();
                else if (type === 'global-feature') hideGlobalFeaturePanel();
            }
        }

        // Resizing Logic
        let isResizing = false;
        let currentPanel = null;

        function initResize(panelId) {
            const panel = document.getElementById(panelId);
            if (!panel) return;
            const handle = panel.querySelector('.resize-handle');
            if (!handle) return;

            handle.addEventListener('mousedown', e => {
                isResizing = true;
                currentPanel = panel;
                document.body.style.cursor = 'ns-resize';
                document.body.style.userSelect = 'none';
            });
        }

        window.addEventListener('mousemove', e => {
            if (!isResizing || !currentPanel) return;
            const newHeight = window.innerHeight - e.clientY;
            if (newHeight > 100 && newHeight < window.innerHeight * 0.9) {
                currentPanel.style.height = newHeight + 'px';
            }
        });

        window.addEventListener('mouseup', () => {
            isResizing = false;
            currentPanel = null;
            document.body.style.cursor = 'default';
            document.body.style.userSelect = 'auto';
        });

        window.addEventListener('hashchange', refreshData);
        window.addEventListener('load', () => {
            if (!window.location.hash) window.location.hash = '#collections';
            populateCollectionDropdown();
            refreshData();
            loadDiffQueue();
        });

        async function populateCollectionDropdown() {
            try {
                const res = await fetch('/api/collection/search');
                if (!res.ok) return;
                const data = await res.json();
                const collections = data.collections || (Array.isArray(data) ? data : []);
                const select = document.getElementById('side-collection-select');
                if (!select) return;

                select.innerHTML = '<option value="">None Selected</option>';
                collections.forEach(c => {
                    const opt = document.createElement('option');
                    opt.value = c.name;
                    opt.innerText = c.name;
                    select.appendChild(opt);
                });

                // Sync with current URL
                const params = new URLSearchParams(window.location.hash.split('?')[1] || '');
                select.value = params.get('collection') || '';
                updateNavVisibility(select.value);

                // Add event listener once populated
                if (!select.dataset.hasListener) {
                    select.addEventListener('change', (e) => {
                        const val = e.target.value;
                        const [hashPath, queryString] = (window.location.hash || '#collections').split('?');
                        const p = new URLSearchParams(queryString);
                        if (val) p.set('collection', val);
                        else p.delete('collection');
                        window.location.hash = `${hashPath}?${p.toString()}`;
                    });
                    select.dataset.hasListener = "true";
                }
            } catch (e) {
                console.error("Failed to populate collections", e);
            }
        }

        function updateNavVisibility(collection) {
            const navItems = ['nav-batches', 'nav-files', 'nav-functions', 'nav-features-global', 'nav-function-similarity'];
            navItems.forEach(id => {
                const el = document.getElementById(id);
                if (el) el.style.display = collection ? 'block' : 'none';
            });
        }

        window.addEventListener('storage', (e) => {
            if (e.key === 'bsim_diff_queue') {
                loadDiffQueue();
                if (diffSelection.length === 2) {
                    // Optionally auto-show diff if 2 selected in another tab?
                    // For now, just update UI.
                }
            }
        });
    </script>

    <script>
        // --- Code Preview Logic ---
        const previewCache = new Map();
        let previewTimer = null;
        let tooltip = null;
        let activePreviewId = null;
        window.previewTips = {};
        window.previewCollection = '';

        function showTokenContextMenu(e) {
            const token = e.target.closest('.feature-highlight');
            if (!token) return;
            e.preventDefault();

            const hashesStr = token.dataset.hashes;
            if (!hashesStr) return;
            const hashes = hashesStr.trim().split(/\s+/);
            const idx = token.dataset.idx;

            // Rich data from preview tips if available
            const richData = (idx !== undefined && window.previewTips) ? window.previewTips[idx] : null;
            const collection = window.previewCollection;

            let menu = document.getElementById('token-context-menu');
            if (!menu) {
                menu = document.createElement('div');
                menu.id = 'token-context-menu';
                menu.className = 'context-menu';
                document.body.appendChild(menu);
            }

            let html = `<div class="context-menu-header">Select Feature to Analyze</div>`;
            if (richData && richData[2]) {
                richData[2].forEach(f => {
                    const hash = f[0], op = f[1], type = f[3], tf = f[7] || 0, color = f[8] || 'var(--accent)';
                    html += `<div class="context-menu-item feature-analyze-item" data-hash="${hash}" data-col="${collection}">
                        <div class="context-menu-icon" style="color:${color}">🔍</div>
                        <div style="flex:1">
                            <div style="font-family:monospace; font-weight:bold; color:${color}">${hash}</div>
                            <div style="font-size:0.7rem; color:var(--subtle); margin-top:2px;">${type} | Op: ${op} | <b style="color:var(--success)">TF: ${tf}</b></div>
                        </div>
                    </div>`;
                });
            } else {
                hashes.forEach(h => {
                    html += `<div class="context-menu-item feature-analyze-item" data-hash="${h}" data-col="${collection}">
                        <div class="context-menu-icon" style="color:var(--accent)">🔍</div>
                        <div style="flex:1">
                            <div style="font-family:monospace; font-weight:bold; color:var(--accent)">${h}</div>
                            <div style="font-size:0.7rem; color:var(--subtle); margin-top:2px;">Feature | Op: --- | <b style="color:var(--success)">TF: ---</b></div>
                        </div>
                    </div>`;
                });
            }

            menu.innerHTML = html;
            menu.style.display = 'block';
            let x = e.clientX, y = e.clientY;
            if (x + 350 > window.innerWidth) x -= 350;
            const itemCount = richData ? richData[2].length : hashes.length;
            if (y + (itemCount * 52 + 50) > window.innerHeight) y -= (itemCount * 52 + 50);
            menu.style.left = x + 'px';
            menu.style.top = y + 'px';

            const onMenuClick = (me) => {
                const item = me.target.closest('.feature-analyze-item');
                if (item) {
                    const h = item.dataset.hash;
                    const c = item.dataset.col;
                    const url = `/feature/index.html?hash=${encodeURIComponent(h)}&collection=${encodeURIComponent(c)}`;

                    if (me.ctrlKey || me.metaKey) {
                        window.open(url, '_blank');
                    } else {
                        showGlobalFeaturePanel(h, c);
                    }
                }
                closeMenu();
            };
            const closeMenu = () => {
                menu.style.display = 'none';
                menu.removeEventListener('click', onMenuClick);
                document.removeEventListener('mousedown', closeGlobal);
            };
            const closeGlobal = (me) => { if (!menu.contains(me.target)) closeMenu(); };
            setTimeout(() => {
                menu.addEventListener('click', onMenuClick);
                document.addEventListener('mousedown', closeGlobal);
            }, 10);
        }

        function showGraphContextMenu(e) {
            const graph = window.graphInstance;
            if (!graph) return;

            // Only trigger if we have active hover indices over the graph area
            const linkIndices = window.lastGraphLinkIndices || [];
            const nodeIndices = window.lastGraphNodeIndices || [];

            if (linkIndices.length === 0 && nodeIndices.length === 0) return;

            e.preventDefault();
            e.stopPropagation();

            // Hide tooltips to avoid overlap
            hideDiffPreview();
            hideCodePreview();
            hideBinaryPreview();
            window.graphContextMenuOpen = true; // Use a global to suppress hovers

            let menu = document.getElementById('graph-context-menu');
            if (!menu) {
                menu = document.createElement('div');
                menu.id = 'graph-context-menu';
                menu.className = 'context-menu';
                document.body.appendChild(menu);
            }

            let html = '';

            if (linkIndices.length > 0) {
                html += `<div class="context-menu-header">Similarity Comparisons (${linkIndices.length})</div>`;
                linkIndices.forEach(idx => {
                    const d = graph.hit_source.data;
                    const id1 = d.id1[idx], id2 = d.id2[idx], f1 = d.f1[idx], f2 = d.f2[idx], score = d.score[idx];
                    html += `<div class="context-menu-item graph-compare-item" data-id1="${id1}" data-id2="${id2}" data-f1="${f1}" data-f2="${f2}">
                        <div class="context-menu-icon" style="color:var(--success)">⇄</div>
                        <div style="flex:1">
                            <div style="font-weight:bold; color:#FFF; font-size:0.75rem;">${f1} vs ${f2}</div>
                            <div style="font-size:0.65rem; color:var(--success); margin-top:2px;">Match Score: <b>${(score * 100).toFixed(2)}%</b></div>
                        </div>
                    </div>`;
                });
            }

            if (nodeIndices.length > 0) {
                html += `<div class="context-menu-header">Function Analysis (${nodeIndices.length})</div>`;
                nodeIndices.forEach(idx => {
                    const d = graph.node_source.data;
                    const id = d.id[idx], name = d.name[idx], addr = d.addr[idx];
                    html += `<div class="context-menu-item graph-node-item" data-id="${id}">
                        <div class="context-menu-icon" style="color:var(--accent)">𝑓</div>
                        <div style="flex:1">
                            <div style="font-weight:bold; color:var(--accent); font-size:0.75rem;">${name}</div>
                            <div style="font-size:0.65rem; color:var(--subtle); font-family:monospace;">Addr: ${addr}</div>
                        </div>
                    </div>`;
                });
            }

            menu.innerHTML = html;
            menu.style.display = 'block';
            let x = e.clientX, y = e.clientY;
            if (x + 350 > window.innerWidth) x -= 350;
            const totalItems = linkIndices.length + nodeIndices.length;
            if (y + (totalItems * 52 + 60) > window.innerHeight) y -= (totalItems * 52 + 60);
            menu.style.left = x + 'px';
            menu.style.top = y + 'px';

            const onMenuClick = (me) => {
                const compareItem = me.target.closest('.graph-compare-item');
                const nodeItem = me.target.closest('.graph-node-item');

                if (compareItem) {
                    const { id1, id2, f1, f2 } = compareItem.dataset;
                    window.openDiffDirectly(id1, f1, id2, f2); // Fixed name
                } else if (nodeItem) {
                    const { id } = nodeItem.dataset;
                    showFunctionCodeById(id);
                }
                closeMenu();
            };
            const closeMenu = () => {
                menu.style.display = 'none';
                window.graphContextMenuOpen = false;
                menu.removeEventListener('click', onMenuClick);
                document.removeEventListener('mousedown', closeGlobal);
            };
            const closeGlobal = (me) => { if (!menu.contains(me.target)) closeMenu(); };
            setTimeout(() => {
                menu.addEventListener('click', onMenuClick);
                document.addEventListener('mousedown', closeGlobal);
            }, 10);
        }

        document.addEventListener('DOMContentLoaded', () => {
            tooltip = document.getElementById('code-preview-tooltip');

            // Attach graph context menu (global to ensure it's not swallowed by Bokeh canvas)
            window.addEventListener('contextmenu', showGraphContextMenu);
        });

        function showTokenTooltip(e) {
            const token = e.target.closest('.feature-highlight');
            if (!token) return;

            const tooltipEl = document.getElementById('token-tooltip');
            const idx = token.dataset.idx;
            const hashesStr = token.dataset.hashes || '';
            const hashes = hashesStr.trim().split(/\s+/);

            let html = '';
            // Case 1: Rich data from preview tips (Function Previews)
            if (idx !== undefined && window.previewTips && window.previewTips[idx]) {
                const data = window.previewTips[idx];
                html = `<div style="font-weight:bold; color:var(--accent); border-bottom:1px solid #333; padding-bottom:5px; margin-bottom:5px;">Features (${data[1]})</div>`;
                data[2].forEach(f => {
                    const color = f[8] || 'var(--accent)';
                    html += `<div style="margin-bottom:8px;">
                        <div style="font-family:monospace; color:${color}; font-weight:bold;">${f[0]}</div>
                        <div style="font-size:0.7rem; color:var(--subtle);">${f[3]} | Op: ${f[1]} | <b style="color:var(--success)">TF: ${f[7] || 0}</b></div>
                    </div>`;
                });
            } else {
                // Case 2: Simple metadata (Global Feature Index Cards)
                const type = token.dataset.type || 'Feature';
                const op = token.dataset.op || 'Op';
                const tf = token.dataset.tf || '0';

                html = `<div style="font-weight:bold; color:var(--accent); border-bottom:1px solid #333; padding-bottom:5px; margin-bottom:5px;">Features (${hashes.length})</div>`;
                hashes.forEach(h => {
                    html += `<div style="margin-bottom:8px;">
                        <div style="font-family:monospace; color:var(--accent); font-weight:bold;">${h}</div>
                        <div style="font-size:0.7rem; color:var(--subtle);">${type} | Op: ${op} | <b style="color:var(--success)">TF: ${tf}</b></div>
                    </div>`;
                });
            }

            tooltipEl.innerHTML = html;
            tooltipEl.style.display = 'block';
            tooltipEl.style.left = (e.clientX + 15) + 'px';
            tooltipEl.style.top = (e.clientY + 15) + "px";

            const rect = tooltipEl.getBoundingClientRect();
            if (rect.right > window.innerWidth) tooltipEl.style.left = (e.clientX - rect.width - 15) + "px";
            if (rect.bottom > window.innerHeight) tooltipEl.style.top = (e.clientY - rect.height - 15) + "px";
        }

        function hideTokenTooltip() {
            const el = document.getElementById('token-tooltip');
            if (el) el.style.display = 'none';
        }

        function moveCodePreview(e) {
            if (!e) return;
            const offset = 15; // px away from cursor

            [tooltip, document.getElementById('token-tooltip'), document.getElementById('diff-preview-tooltip'), document.getElementById('binary-preview-tooltip')].forEach(el => {
                if (el && (el.style.display === 'block' || el.classList.contains('showing'))) {
                    let x = e.clientX + offset;
                    let y = e.clientY + offset;

                    // Collision detection with window edges
                    const rect = el.getBoundingClientRect();
                    if (x + rect.width > window.innerWidth) {
                        x = e.clientX - rect.width - offset;
                    }
                    if (y + rect.height > window.innerHeight) {
                        y = e.clientY - rect.height - offset;
                    }

                    el.style.left = x + 'px';
                    el.style.top = y + 'px';
                    el.classList.add('showing');
                }
            });
        }
        document.addEventListener('mousemove', moveCodePreview);

        function hideCodePreview(e) {
            if (previewTimer) clearTimeout(previewTimer);
            if (e && e.relatedTarget && (tooltip.contains(e.relatedTarget) || e.relatedTarget === tooltip)) return;
            if (tooltip) {
                tooltip.style.display = 'none';
                tooltip.classList.remove('showing');
                activePreviewId = null;
            }
        }

        async function showCodePreview(id, name, addr, bin, v_size, e, extra = 0, file_name = '') {
            if (id === activePreviewId) {
                moveCodePreview(e);
                return;
            }
            activePreviewId = id;
            const collection = id.split(':')[0];
            if (previewTimer) clearTimeout(previewTimer);

            // Immediate display
            if (!tooltip) return;
            tooltip.style.display = 'flex';
            tooltip.classList.add('showing');
            moveCodePreview(e);

            const extraHtml = extra > 0 ? `<div class="others-count-card"><span>⚡</span> And ${extra} other functions...</div>` : '';

            tooltip.innerHTML = `
                <div class="preview-card">
                    <div class="preview-header">Quick Preview: ${name || id.split(':').pop()}</div>
                    <div style="font-size:0.65rem; color:var(--accent); font-family:monospace; padding:0 8px; margin-bottom:5px;">
                        Addr: ${addr || '---'} | Bin: ${file_name || bin || '---'} | Feat: ${v_size || 0}
                    </div>
                    <div style="font-size:0.55rem; color:var(--subtle); padding:0 8px; overflow:hidden; text-overflow:ellipsis; white-space:nowrap;">ID: ${id}</div>
                    <div class="preview-header" style="border:none; margin-top:10px;">Loading Code...</div>
                </div>
                ${extraHtml}
            `;

            if (!tooltip.dataset.hasLeave) {
                tooltip.addEventListener('mouseleave', () => { tooltip.style.display = 'none'; });
                tooltip.dataset.hasLeave = "true";
            }

            previewTimer = setTimeout(async () => {
                if (previewCache.has(id)) {
                    const cached = previewCache.get(id);
                    window.previewTips = cached.tips;
                    window.previewCollection = collection;
                    renderPreview(data, name, addr, bin, v_size, extra, file_name);
                    return;
                }

                try {
                    const res = await fetch(`/api/function/code?id=${encodeURIComponent(id)}`);
                    if (!res.ok) throw new Error("Preview failed");
                    const data = await res.json();
                    window.previewTips = data.tips;
                    window.previewCollection = collection;
                    previewCache.set(id, data);
                    renderPreview(data, name, addr, bin, v_size, extra, file_name);
                } catch (err) {
                    tooltip.innerHTML = `<div class="preview-header" style="color:#ff5555">Error loading preview</div>`;
                }
            }, 50);
        }

        function renderPreview(data, name, addr, bin, v_size, extra = 0, file_name = '') {
            if (!tooltip) return;
            const rows = data.rows.slice(0, 18);
            const extraHtml = extra > 0 ? `<div class="others-count-card"><span>⚡</span> And ${extra} other functions...</div>` : '';

            let html = `
                <div class="preview-card">
                    <div class="preview-header">Quick Preview: ${name || data.rows[0]?.tokens[0]?.text || 'Function'}</div>
                    <div style="font-size:0.65rem; color:var(--accent); font-family:monospace; padding:0 8px; margin-bottom:5px;">
                        Addr: ${addr || '---'} | Bin: ${file_name || bin || '---'} | Feat: ${v_size || 0}
                    </div>
                    <div class="c-code-container" style="border:none; margin:0; padding:0; background:transparent;">`;

            rows.forEach(row => {
                let lineHtml = '';
                row.tokens.forEach(t => {
                    const featClass = t.has_features ? 'feature-highlight' : '';
                    const hashes = (t.hash_list || []).join(' ');
                    lineHtml += `<span class="token token-${t.type} ${featClass}" data-idx="${t.global_idx}" data-hashes="${hashes}"
                        onmouseenter="showTokenTooltip(event)" onmouseleave="hideTokenTooltip()" onmousemove="moveCodePreview(event)">${t.text.replace(/&/g, '&amp;').replace(/</g, '&lt;')}</span>`;
                });
                html += `<div class="code-line"><div class="gutter" style="background:transparent;"><div class="line-num">${row.line_idx}</div></div><div class="line-content">${lineHtml}</div></div>`;
            });
            html += '</div>';
            if (data.rows.length > 18) html += '<div class="preview-header" style="border:none; margin-top:5px;">...</div>';
            html += '</div>'; // End c-code-container content
            html += '</div>'; // End preview-card
            html += extraHtml;
            tooltip.innerHTML = html;
        }

        document.addEventListener('contextmenu', e => {
            if (e.target.closest('.feature-highlight')) {
                showTokenContextMenu(e);
            }
        });

        // --- Diff Preview Logic ---
        let diffPreviewTimer = null;
        let activeDiffKey = null;
        const diffPreviewCache = new Map();

        function hideDiffPreview(e) {
            if (diffPreviewTimer) clearTimeout(diffPreviewTimer);
            const tooltip = document.getElementById('diff-preview-tooltip');
            if (e && e.relatedTarget && (tooltip.contains(e.relatedTarget) || e.relatedTarget === tooltip)) return;
            if (tooltip) {
                tooltip.style.display = 'none';
                tooltip.classList.remove('showing');
                activeDiffKey = null;
            }
        }

        async function showDiffPreview(id1, name1, id2, name2, score, e, extra = 0) {
            const cacheKey = `${id1}::${id2}`;
            if (cacheKey === activeDiffKey) {
                moveCodePreview(e);
                return;
            }
            activeDiffKey = cacheKey;
            const tooltip = document.getElementById('diff-preview-tooltip');
            if (diffPreviewTimer) clearTimeout(diffPreviewTimer);

            // Immediate display
            if (!tooltip) return;
            tooltip.style.display = 'flex';
            tooltip.classList.add('showing');
            moveCodePreview(e);

            const extraHtml = extra > 0 ? `<div class="others-count-card" style="width:100%; box-sizing:border-box;"><span>⚡</span> And ${extra} other matches...</div>` : '';

            tooltip.innerHTML = `
                <div class="preview-card" style="width:100%">
                    <div class="diff-preview-header" style="background:#252525; border-bottom:1px solid #333; padding:10px 15px;">
                        <div style="display:flex; flex-direction:column; gap:5px;">
                            <div style="display:flex; align-items:center; gap:8px;">
                                <span class="badge" style="background:var(--accent); color:#000; font-size:0.6rem;">L</span>
                                <span style="color:#FFF;">${name1}</span>
                                <span style="color:var(--subtle); margin:0 5px;">vs</span>
                                <span class="badge" style="background:var(--success); color:#000; font-size:0.6rem;">R</span>
                                <span style="color:#FFF;">${name2}</span>
                            </div>
                            <div style="font-size:1rem; font-weight:bold; color:var(--success); border-top:1px solid #444; padding-top:5px; display:flex; justify-content:space-between; align-items:center;">
                                <span>${(score * 100).toFixed(2)}% Match</span>
                                <span style="color:var(--accent); font-size:0.65rem; font-weight:bold;">LOADING DIFF...</span>
                            </div>
                        </div>
                    </div>
                    <div style="height:80px; display:flex; align-items:center; justify-content:center; color:var(--subtle); font-size:0.7rem;">
                        Fetching side-by-side comparison...
                    </div>
                </div>
                ${extraHtml}
            `;

            diffPreviewTimer = setTimeout(async () => {
                if (diffPreviewCache.has(cacheKey)) {
                    renderDiffPreview(diffPreviewCache.get(cacheKey), name1, name2, score, extra);
                    return;
                }

                try {
                    const res = await fetch(`/api/diff?id1=${encodeURIComponent(id1)}&id2=${encodeURIComponent(id2)}`);
                    if (!res.ok) throw new Error("Diff failed");
                    const data = await res.json();
                    diffPreviewCache.set(cacheKey, data);
                    renderDiffPreview(data, name1, name2, score, extra);
                } catch (err) {
                    tooltip.innerHTML = `<div class="diff-preview-header" style="color:#ff5555">Error loading diff preview</div>`;
                }
            }, 300); // 300ms delay to avoid spamming
        }

        function renderDiffPreview(data, name1, name2, score, extra = 0) {
            const tooltip = document.getElementById('diff-preview-tooltip');
            if (!tooltip) return;

            const maxRows = 12;
            const rows = data.rows.slice(0, maxRows);

            const extraHtml = extra > 0 ? `<div class="others-count-card" style="width:100%; box-sizing:border-box;"><span>⚡</span> And ${extra} other matches...</div>` : '';

            let html = `
                <div class="preview-card" style="width:100%">
                    <div class="diff-preview-header" style="background:#252525; border-bottom:1px solid #333; padding:10px 15px;">
                        <div style="display:flex; flex-direction:column; gap:5px;">
                            <div style="display:flex; align-items:center; gap:8px;">
                                <span class="badge" style="background:var(--accent); color:#000; font-size:0.6rem;">L</span>
                                <span style="color:#FFF;">${name1}</span>
                                <span style="color:var(--subtle); margin:0 5px;">vs</span>
                                <span class="badge" style="background:var(--success); color:#000; font-size:0.6rem;">R</span>
                                <span style="color:#FFF;">${name2}</span>
                            </div>
                            <div style="font-size:1rem; font-weight:bold; color:var(--success); border-top:1px solid #444; padding-top:5px; display:flex; justify-content:space-between; align-items:center;">
                                <span>${(score * 100).toFixed(2)}% Match</span>
                                <span style="color:var(--accent); font-size:0.65rem; font-weight:bold;">${data.rows.length} ROWS MATCH</span>
                            </div>
                        </div>
                    </div>
                    <div style="flex:1; overflow:hidden; display:flex; background:#0d0f14; font-family:'JetBrains Mono', monospace; font-size:0.7rem;">
                    <div style="flex:1; border-right:1px solid #333; overflow:hidden; border-left:4px solid var(--accent);">
                        ${rows.map(r => renderPreviewSide(r.l, 'l')).join('')}
                    </div>
                    <div style="flex:1; overflow:hidden; border-left:4px solid var(--success);">
                        ${rows.map(r => renderPreviewSide(r.r, 'r')).join('')}
                    </div>
                </div>
                </div>
                ${data.rows.length > maxRows ? `<div style="background:#111; text-align:center; font-size:0.6rem; color:var(--subtle); padding:4px; border-top:1px solid #333;">... ${data.rows.length - maxRows} more rows (click 'Run Diff' for full view) ...</div>` : ''}
                </div>
                ${extraHtml}
            `;
            tooltip.innerHTML = html;
        }

        function renderPreviewSide(sideData, side) {
            if (!sideData) return `<div style="height:1.3em; background:rgba(255,255,255,0.02)"></div>`;

            const tokens = sideData.tokens || [];
            let lineHtml = tokens.map(t => {
                const cls = t.diff_class || '';
                const typeClass = t.type ? `token-${t.type}` : '';
                return `<span class="token ${typeClass} ${cls}">${t.text.replace(/&/g, '&amp;').replace(/</g, '&lt;')}</span>`;
            }).join('');

            const bgMap = { 'diff-match': 'rgba(166,226,46,0.05)', 'diff-unique': 'rgba(249,38,114,0.05)', 'tag-replace': 'rgba(102,217,239,0.05)' };
            const bg = bgMap[sideData.chunk_class?.split(' ')[0]] || 'transparent';

            return `<div style="white-space:pre; height:1.3em; padding:0 8px; background:${bg}; border-bottom:1px solid rgba(255,255,255,0.02); overflow:hidden;">${lineHtml}</div>`;
        }

        // --- Binary Preview Logic ---
        function showBinaryPreview(md5, name, count, language, tags, e) {
            let bTooltip = document.getElementById('binary-preview-tooltip');
            if (!bTooltip) {
                bTooltip = document.createElement('div');
                bTooltip.id = 'binary-preview-tooltip';
                bTooltip.className = 'code-preview-tooltip'; // reuse styles
                bTooltip.style.position = 'fixed';
                bTooltip.style.zIndex = '10000';
                bTooltip.style.pointerEvents = 'none';
                bTooltip.style.background = '#1A1A1A';
                bTooltip.style.border = '1px solid #333';
                bTooltip.style.borderRadius = '8px';
                bTooltip.style.padding = '12px';
                bTooltip.style.minWidth = '250px';
                document.body.appendChild(bTooltip);
            }

            bTooltip.style.display = 'block';
            bTooltip.classList.add('showing');

            // Move it
            const offset = 15;
            let x = e.clientX + offset;
            let y = e.clientY + offset;
            if (x + 280 > window.innerWidth) x = e.clientX - 280 - offset;
            bTooltip.style.left = x + 'px';
            bTooltip.style.top = y + 'px';

            bTooltip.innerHTML = `
                <div style="font-size:14px; font-weight:bold; margin-bottom:4px; color:var(--accent);">${name} (BINARY)</div>
                <div style="font-size:10px; color:#AAA; margin-bottom:8px; word-break:break-all;">MD5: ${md5}</div>
                <div style="font-size:11px; margin-bottom:4px;"><span style="color:#75715e">Language:</span> <b style="color:#66d9ef">${language}</b></div>
                <div style="font-size:11px; margin-bottom:8px;"><span style="color:#75715e">Tags:</span> <span style="color:#a6e22e">${tags || 'None'}</span></div>
                <div style="display:flex; justify-content:space-between; font-size:12px; border-top:1px solid #333; padding-top:8px;">
                    <span>Functions in Graph:</span>
                    <b style="color:#ff79c6;">${count}</b>
                </div>
            `;
        }

        function hideBinaryPreview() {
            const bTooltip = document.getElementById('binary-preview-tooltip');
            if (bTooltip) {
                bTooltip.style.display = 'none';
                bTooltip.classList.remove('showing');
            }
        }

        // --- Similarity Tagging Logic ---
        function attachTagAutocomplete(input, onSelect) {
            if (input._acAttached) return;
            input._acAttached = true;

            const parent = input.parentElement;
            const dropdown = document.createElement('div');
            dropdown.className = 'tag-autocomplete-dropdown';
            parent.appendChild(dropdown);

            const renderSuggestions = (tags) => {
                dropdown.innerHTML = '';
                tags.forEach(t => {
                    const item = document.createElement('div');
                    item.className = 'tag-suggestion-item';
                    const meta = tagMetadata[t] || { color: '#66d9ef', count: 0, priority: 0 };
                    const isBookmark = (t === 'bookmark');
                    item.innerHTML = `
                        <div class="tag-color-dot" style="background:${meta.color}; display:${isBookmark ? 'none' : 'block'};"></div>
                        ${isBookmark ? '<svg width="12" height="12" viewBox="0 0 24 24" fill="#66d9ef" stroke="#66d9ef" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="margin-right:8px;"><path d="M19 21l-7-5-7 5V5a2 2 0 0 1 2-2h10a2 2 0 0 1 2 2z"></path></svg>' : ''}
                        <span style="flex:1">${t}</span>
                        <span class="dim" style="font-size:0.6rem; margin-left:10px;">Prio: ${meta.priority || 0}</span>
                        <span class="dim" style="font-size:0.6rem; margin-left:10px;">${meta.count || 0}</span>
                    `;
                    item.onmousedown = (e) => {
                        e.preventDefault();
                        onSelect(t);
                        dropdown.style.display = 'none';
                    };
                    dropdown.appendChild(item);
                });
                dropdown.style.display = 'block';
            };

            const showSuggestions = (filter = '') => {
                const query = filter.toLowerCase().trim();
                const tags = Object.keys(tagMetadata).filter(t => t.toLowerCase().includes(query));
                if (tags.length > 0) {
                    renderSuggestions(tags);
                } else {
                    dropdown.style.display = 'none';
                }
            };

            input.onfocus = () => showSuggestions(input.value);
            input.oninput = () => showSuggestions(input.value);
            input.onblur = () => {
                setTimeout(() => { dropdown.style.display = 'none'; }, 200);
            };

            // Trigger immediately if already focused (e.g. attached via onfocus)
            if (document.activeElement === input) showSuggestions(input.value);
        }

        function toggleSimilaritySelection(event, id1, id2, algo) {
            const pairId = `${id1}|${id2}|${algo}`;
            if (event.target.checked) {
                selectedSimilarityPairs.add(pairId);
            } else {
                selectedSimilarityPairs.delete(pairId);
            }

            // Update Select All checkbox state
            const allChecked = Array.from(document.querySelectorAll('.row-selector')).every(cb => cb.checked);
            const selectAllCb = document.getElementById('select-all-sim');
            if (selectAllCb) {
                selectAllCb.checked = allChecked;
                selectAllCb.indeterminate = !allChecked && Array.from(document.querySelectorAll('.row-selector')).some(cb => cb.checked);
            }
        }

        function toggleAllSimilaritySelection(selectAllCb) {
            const isChecked = selectAllCb.checked;
            const checkboxes = document.querySelectorAll('.row-selector');
            checkboxes.forEach(cb => {
                cb.checked = isChecked;
                const pairId = cb.getAttribute('data-pair-id');
                if (pairId) {
                    if (isChecked) selectedSimilarityPairs.add(pairId);
                    else selectedSimilarityPairs.delete(pairId);
                }
            });
        }

        function getSimilarityRowInfo(pairId) {
            const cb = document.querySelector(`.row-selector[data-pair-id="${pairId}"]`);
            if (!cb) return null;
            const row = cb.closest('tr.sim-row');
            const container = row.querySelector('.sim-tags-editor');
            const parts = pairId.split('|');
            return { row, container, id1: parts[0], id2: parts[1], algo: parts[2] };
        }

        async function toggleEntityBookmark(event, etype, eid) {
            event.stopPropagation();
            const btn = event.currentTarget;
            const isBookmarked = btn.classList.contains('active');
            const action = isBookmarked ? 'remove' : 'add';

            if (action === 'remove') {
                await removeTag(null, etype, eid, 'bookmark');
                btn.classList.remove('active');
                btn.title = "Add Bookmark";
            } else {
                await confirmAddTag(etype, eid, 'bookmark');
                btn.classList.add('active');
                btn.title = "Remove Bookmark";
            }
            refreshAllRowColors();
        }

        async function toggleBookmark(event, id1, id2, algo) {
            event.stopPropagation();
            const btn = event.currentTarget;
            const isBookmarked = btn.classList.contains('active');
            const pairId = `${id1}|${id2}|${algo}`;

            let targets = [{ id1, id2, algo, btn }];
            if (selectedSimilarityPairs.has(pairId)) {
                targets = Array.from(selectedSimilarityPairs).map(pid => {
                    const info = getSimilarityRowInfo(pid);
                    return info ? { id1: info.id1, id2: info.id2, algo: info.algo, btn: info.container.querySelector('.bookmark-btn') } : null;
                }).filter(t => t !== null);
            }

            const action = isBookmarked ? 'remove' : 'add';

            for (const t of targets) {
                const eid = `${t.id1}|${t.id2}|${t.algo}`;
                if (action === 'remove') {
                    await removeTag(null, 'similarity', eid, 'bookmark');
                    if (t.btn) {
                        t.btn.classList.remove('active');
                        t.btn.title = "Add Bookmark";
                    }
                } else {
                    await confirmAddTag('similarity', eid, 'bookmark');
                    if (t.btn) {
                        t.btn.classList.add('active');
                        t.btn.title = "Remove Bookmark";
                    }
                }
            }
            refreshAllRowColors();
        }

        async function startAddTag(event, etype, eid) {
            event.stopPropagation();
            const btn = event.target;
            const parent = btn.parentElement;

            const wrapper = document.createElement('div');
            wrapper.style.position = 'relative';
            wrapper.style.display = 'inline-block';

            const input = document.createElement('input');
            input.type = 'text';
            input.className = 'tag-input-field';
            input.placeholder = 'Tag...';

            wrapper.appendChild(input);
            parent.replaceChild(wrapper, btn);

            attachTagAutocomplete(input, async (tag) => {
                await confirmAddTag(etype, eid, tag, parent);
                cleanup();
            });
            input.focus();

            let isClosing = false;
            const cleanup = () => {
                if (isClosing) return;
                isClosing = true;
                if (wrapper.parentNode === parent) parent.replaceChild(btn, wrapper);
            };

            input.onblur = () => {
                setTimeout(cleanup, 200);
            };

            input.onkeyup = async (e) => {
                if (e.key === 'Enter') {
                    const tag = input.value.trim();
                    if (tag) await confirmAddTag(etype, eid, tag, parent);
                    cleanup();
                } else if (e.key === 'Escape') {
                    cleanup();
                }
            };
        }
        async function confirmAddTag(etype, eid, tag, container) {
            const params = new URLSearchParams(window.location.hash.split('?')[1] || '');
            const col = params.get('collection') || 'main';

            // Handle batching for similarities
            let targets = [{ etype, eid, container }];
            if (etype === 'similarity' && selectedSimilarityPairs.has(eid)) {
                targets = Array.from(selectedSimilarityPairs).map(pid => {
                    const info = getSimilarityRowInfo(pid);
                    return info ? { etype: 'similarity', eid: pid, container: info.container } : null;
                }).filter(t => t !== null);
            }

            // Identify targets for UI update (broadcast to all instances of this entity on the page)
            let uiTargets = [container];
            if (etype === 'function' || etype === 'file') {
                const allEditors = document.querySelectorAll(`[data-etype="${etype}"][data-eid="${eid}"]`);
                if (allEditors.length > 0) uiTargets = Array.from(allEditors);
            } else if (etype === 'similarity' && selectedSimilarityPairs.has(eid)) {
                uiTargets = targets.map(t => t.container).filter(c => !!c);
            }

            let mainSuccess = false;
            for (const t of targets) {
                try {
                    let url = '/api/tags/add';
                    let body = { collection: col, entity_type: t.etype, entity_id: t.eid, tag };

                    const res = await fetch(url, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify(body)
                    });

                    if (res.ok) {
                        if (!tagMetadata[tag]) await fetchTagMetadata(col);
                        const meta = tagMetadata[tag] || { color: '#66d9ef' };
                        const color = meta.color;
                        const isBookmark = (tag === 'bookmark');

                        // Update all UI instances for this entity
                        const editorsToUpdate = (t.eid === eid) ? uiTargets : [t.container];

                        editorsToUpdate.forEach(editor => {
                            if (!editor) return;
                            if (isBookmark) {
                                const bookmarkBtn = editor.querySelector('.bookmark-btn');
                                if (bookmarkBtn) {
                                    bookmarkBtn.classList.add('active');
                                    bookmarkBtn.title = "Remove Bookmark";
                                }
                            } else {
                                const existing = Array.from(editor.querySelectorAll('.sim-tag-card')).find(c => c.textContent.trim().startsWith(tag));
                                if (!existing) {
                                    const card = document.createElement('span');
                                    card.className = 'sim-tag-card';
                                    card.style.borderColor = color + '44';
                                    card.style.color = color;
                                    card.style.background = color + '11';
                                    const removeClick = `removeTag(event, '${t.etype}', '${t.eid}', '${tag}')`;
                                    card.innerHTML = `${tag} <span class="remove-tag-btn" onclick="${removeClick}" style="background:${color}22">×</span>`;
                                    editor.insertBefore(card, editor.lastElementChild);
                                }
                            }
                        });

                        if (t.eid === eid) mainSuccess = true;
                    }
                } catch (err) { console.error(err); }
            }
            refreshAllRowColors();
            return mainSuccess;
        }

        async function removeTag(event, etype, eid, tag) {
            if (event) event.stopPropagation();
            const params = new URLSearchParams(window.location.hash.split('?')[1] || '');
            const col = params.get('collection') || 'main';

            let targets = [{ etype, eid }];
            if (etype === 'similarity' && selectedSimilarityPairs.has(eid)) {
                targets = Array.from(selectedSimilarityPairs).map(pid => {
                    const info = getSimilarityRowInfo(pid);
                    return info ? { etype: 'similarity', eid: pid, container: info.container } : null;
                }).filter(t => t !== null);
            }

            for (const t of targets) {
                try {
                    const res = await fetch('/api/tags/remove', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ collection: col, entity_type: t.etype, entity_id: t.eid, tag })
                    });

                    if (res.ok) {
                        // Broadast update to all instances of this entity
                        const editorsToUpdate = (t.etype === 'function' || t.etype === 'file')
                            ? document.querySelectorAll(`[data-etype="${t.etype}"][data-eid="${t.eid}"]`)
                            : (t.container ? [t.container] : document.querySelectorAll(`[data-eid="${t.eid}"][data-etype="${t.etype}"]`));

                        editorsToUpdate.forEach(container => {
                            if (!container) return;
                            if (tag === 'bookmark') {
                                const btn = container.querySelector('.bookmark-btn');
                                if (btn) {
                                    btn.classList.remove('active');
                                    btn.title = "Add Bookmark";
                                }
                            } else {
                                const cards = container.querySelectorAll('.sim-tag-card');
                                cards.forEach(c => {
                                    if (c.textContent.trim().startsWith(tag)) c.remove();
                                });
                            }
                        });
                    }
                } catch (err) { console.error(err); }
            }
            refreshAllRowColors();
        }

        initResize('code-panel');
        initResize('feature-panel');
        initResize('global-feature-panel');
        initResize('diff-panel');
    </script>
</body>
