services:
  redis:
    image: redis:latest
    container_name: bsimvis_redis
    ports:
      - "6379:6379"
    restart: always

  kvrocks:
    image: apache/kvrocks:2.15.0
    container_name: bsimvis_kvrocks
    ports:
      - "6666:6666"
    volumes:
      - ./kvrocks_data:/var/lib/kvrocks
      - ./kvrocks.conf:/var/lib/kvrocks/kvrocks.conf:ro
    # No custom entrypoint/command needed if the config is in the right place
    deploy:
      resources:
        limits:
          memory: 8G
    restart: always