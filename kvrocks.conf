################################ GENERAL #####################################
bind 0.0.0.0
port 6666
workers 8
# IMPORTANT: This must match your Docker volume mount
dir /var/lib/kvrocks
db-name bsimvis.db

################################ ROCKSDB #####################################
# Give 12GB to the Block Cache (Great for your 32GB RAM)
rocksdb.block_cache_size 12288
rocksdb.block_cache_type hcc

# Increase Write Buffers to 256MB each (Prevents "Write Buffer Full" stalls)
rocksdb.write_buffer_size 256
rocksdb.max_write_buffer_number 4

# High-speed background threads for compaction/flushing
rocksdb.max_background_jobs 12
rocksdb.max_subcompactions 4

# Performance monitoring (Dumps stats every 30s so we can debug stalls)
rocksdb.stats_dump_period_sec 30

# Advanced Write Tuning
rocksdb.level0_slowdown_writes_trigger 40
rocksdb.level0_stop_writes_trigger 60

################################ SEARCH ######################################
# In 2.15, use this to prevent the indexing queue from overflowing
search-max-pending-indexing-tasks 50000


# Change this to -1 to disable the PID file entirely
pidfile -1

# Remove or comment out the 'search-max-pending-indexing-tasks' line 
# (It seems your binary doesn't support this specific key yet)

# Ensure dir is set correctly
dir /var/lib/kvrocks